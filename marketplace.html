<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurum Prism · Marketplace</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#060605;color:#ede8df;font-family:"JetBrains Mono",monospace;font-size:13px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:"JetBrains Mono",monospace;background:#09090a;color:#ede8df;border:1px solid rgba(255,255,255,.07);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:rgba(197,165,114,.5)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:#282523}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:root{--gold:#C5A572;--goldB:#DEB97A;--goldD:#8a7c68;--goldBd:rgba(197,165,114,.22);--goldW:rgba(197,165,114,.06);--goldBdS:rgba(197,165,114,.5);--goldGlow:rgba(197,165,114,.35);--green:#5a9e72;--greenBd:rgba(90,158,114,.28);--greenW:rgba(90,158,114,.07);--amber:#b8833a;--amberBd:rgba(184,131,58,.28);--amberW:rgba(184,131,58,.07);--red:#b05e56;--redBd:rgba(176,94,86,.26);--redW:rgba(176,94,86,.07);--blue:#5a98ec;--blueBd:rgba(90,152,236,.28);--blueW:rgba(90,152,236,.07);--wire:rgba(255,255,255,.06);--dim:#282523}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(197,165,114,.3)}50%{box-shadow:0 0 18px rgba(197,165,114,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
/* SESSION EXPIRY */
#session-expired{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center}
#session-expired.on{display:flex}
.se-box{background:#0e0d0c;border:1px solid var(--goldBd);padding:28px 32px;text-align:center;max-width:320px}
.se-title{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.se-btn{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#060605;padding:10px 22px;background:var(--gold);border:none;cursor:pointer}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--goldBd);padding:8px 16px;font-family:"JetBrains Mono",monospace;font-size:9px;color:#a89f94;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}.toast.ok{color:var(--gold)}.toast.err{color:var(--red);border-color:var(--redBd)}
/* NAV */
.nav{height:50px;background:rgba(6,6,5,.97);border-bottom:1px solid var(--wire);display:flex;align-items:center;padding:0 16px;flex-shrink:0;position:relative}
.nav::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.25}
.nav-mark{width:30px;height:30px;border:1px solid var(--goldBd);background:var(--goldW);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;color:var(--gold);flex-shrink:0;margin-right:10px;animation:glow 3s ease-in-out infinite}
.nav-brand-name{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.38em;color:#ede8df;text-transform:uppercase}
.nav-brand-name span{color:var(--gold)}
.nav-brand-tag{font-family:"JetBrains Mono",monospace;font-size:6px;letter-spacing:.18em;color:var(--goldD);text-transform:uppercase;margin-top:2px}
.nav-tabs{display:flex;border-left:1px solid var(--wire);margin-left:12px}
.ntab{padding:0 14px;height:50px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#635e58;border-right:1px solid var(--wire);cursor:pointer;transition:all .14s;background:transparent;white-space:nowrap;position:relative;min-height:44px}
.ntab.on{color:var(--gold);background:var(--goldW)}
.ntab.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.ntab:hover:not(.on){color:#a89f94}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-chip{font-family:"JetBrains Mono",monospace;font-size:7px;color:var(--goldD);padding:3px 9px;border:1px solid var(--goldBd);background:var(--goldW);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.nav-ghost{font-family:"JetBrains Mono",monospace;font-size:6.5px;color:#635e58;padding:5px 8px;border:1px solid var(--wire);cursor:pointer;transition:all .14s;white-space:nowrap;min-height:44px;display:flex;align-items:center}
.nav-ghost:hover{color:var(--gold);border-color:var(--goldBd)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer;flex-shrink:0}
.nav-hamburger span{display:block;width:20px;height:1.5px;background:var(--gold)}
.mob-nav{display:none;position:fixed;top:50px;left:0;right:0;background:#0a0908;border-bottom:1px solid var(--goldBd);z-index:100;flex-direction:column}
.mob-nav.on{display:flex}
.mob-tab{padding:12px 16px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#635e58;border-bottom:1px solid var(--wire);cursor:pointer;min-height:44px;display:flex;align-items:center}
.mob-tab.on{color:var(--gold)}
/* FILTER BAR - fix: overflow-x:auto */
.filter-bar{height:38px;display:flex;align-items:center;padding:0 14px;gap:5px;background:#09090a;border-bottom:1px solid var(--wire);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fp{font-family:"JetBrains Mono",monospace;font-size:6px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;cursor:pointer;transition:all .12s;border:1px solid;white-space:nowrap;min-height:28px;flex-shrink:0}
.fp.on{color:#060605;background:var(--gold);border-color:var(--gold)}
.fp.off{color:#635e58;border-color:var(--wire);background:transparent}
.fp.off:hover{color:var(--gold);border-color:var(--goldBd)}
.filter-sep{width:1px;height:20px;background:var(--wire);flex-shrink:0}
.filter-count{font-family:"JetBrains Mono",monospace;font-size:6.5px;color:#635e58;margin-left:auto;white-space:nowrap;flex-shrink:0}
/* MAIN LAYOUT */
#app{display:flex;flex:1;overflow:hidden}
/* DEAL RAIL - fix: hidden below 900px, overflow-x on mobile */
.deal-rail{width:232px;flex-shrink:0;border-right:1px solid var(--wire);background:#09090a;overflow-y:auto;display:flex;flex-direction:column}
.rail-search{padding:6px 8px;border-bottom:1px solid var(--wire);flex-shrink:0}
.rail-inp{width:100%;padding:5px 8px;font-size:10px}
/* Deal card in rail */
.deal-card{border-bottom:1px solid rgba(255,255,255,.035);cursor:pointer;transition:all .13s;border-left:2px solid transparent;position:relative;min-height:80px}
.deal-card:hover{background:var(--goldW);border-left-color:var(--goldD)}
.deal-card.sel{background:rgba(197,165,114,.08);border-left-color:var(--gold)}
.deal-card.sel::after{content:"▸";position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:9px}
.dc-inner{padding:9px 11px}
.dc-name{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;color:#ede8df;line-height:1.15;margin-bottom:4px}
.dc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-family:"JetBrains Mono",monospace;font-size:5px;letter-spacing:.1em;text-transform:uppercase;padding:2px 5px;border:1px solid}
.badge-credit{color:var(--blue);border-color:var(--blueBd);background:var(--blueW)}
.badge-pe{color:var(--gold);border-color:var(--goldBd);background:var(--goldW)}
.badge-re{color:var(--green);border-color:var(--greenBd);background:var(--greenW)}
.badge-infra{color:#a89f94;border-color:var(--wire)}
.badge-ioi{color:var(--gold);border-color:var(--goldBd);background:var(--goldW)}
.badge-live{color:var(--green);border-color:var(--greenBd);background:var(--greenW)}
.dc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid rgba(255,255,255,.04)}
.dc-metric{padding:4px 11px;border-right:1px solid rgba(255,255,255,.04)}
.dc-metric:last-child{border-right:0}
.dc-metric-l{font-family:"JetBrains Mono",monospace;font-size:5.5px;color:#635e58;text-transform:uppercase;letter-spacing:.1em}
.dc-metric-v{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;color:var(--gold);line-height:1}
.dc-bar{height:2px;background:var(--dim)}
.dc-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--goldB));transition:width .3s}
/* DEAL DETAIL */
.deal-detail{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#060605}
.dd-hdr{padding:14px 20px;border-bottom:1px solid var(--wire);background:#09090a;flex-shrink:0}
.dd-tag-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.dd-asset-tag{font-family:"JetBrains Mono",monospace;font-size:6px;letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border:1px solid}
.dd-title{font-family:"Barlow Condensed",sans-serif;font-size:clamp(22px,4vw,34px);font-weight:800;letter-spacing:-.01em;line-height:1;margin-bottom:4px;color:#ede8df}
.dd-title span{color:var(--gold)}
.dd-sub{font-family:"JetBrains Mono",monospace;font-size:7px;color:#635e58;line-height:1.7;margin-bottom:10px}
.metrics-row{display:flex;gap:0;border:1px solid var(--wire);background:#0c0c0a;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.metrics-row::-webkit-scrollbar{display:none}
.mr-metric{padding:8px 16px;border-right:1px solid var(--wire);flex-shrink:0;min-width:100px}
.mr-lbl{font-family:"JetBrains Mono",monospace;font-size:6px;letter-spacing:.18em;color:#635e58;text-transform:uppercase;margin-bottom:3px}
.mr-val{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:1px}
.mr-sub{font-family:"JetBrains Mono",monospace;font-size:6.5px;color:#635e58}
/* Countdown */
.countdown-strip{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--amberW);border-bottom:1px solid var(--amberBd);font-family:"JetBrains Mono",monospace;font-size:7.5px;color:var(--amber);flex-shrink:0}
/* Detail tabs */
.dtabs{display:flex;background:#09090a;border-bottom:1px solid var(--wire);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.dtab{padding:9px 14px;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#635e58;border-right:1px solid var(--wire);cursor:pointer;transition:all .14s;white-space:nowrap;position:relative;min-height:44px;display:flex;align-items:center}
.dtab.on{color:var(--gold);background:var(--goldW)}
.dtab.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.dtab:hover:not(.on){color:#a89f94}
/* Tab body */
.dtab-body{flex:1;overflow-y:auto;padding:14px 18px}
/* Overview grid */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.ov-block{background:#0c0c0a;border:1px solid var(--wire);padding:11px 13px}
.ov-lbl{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--goldBd)}
.ov-text{font-family:"JetBrains Mono",monospace;font-size:9px;color:#a89f94;line-height:1.75;font-weight:300}
/* Highlights */
.hl-item{display:flex;gap:7px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hl-item:last-child{border-bottom:0}
.hl-dot{color:var(--gold);font-size:9px;flex-shrink:0;margin-top:2px}
.hl-s{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;color:#ede8df;margin-bottom:2px}
.hl-b{font-family:"JetBrains Mono",monospace;font-size:8px;color:#635e58;line-height:1.6}
/* Timeline */
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start}
.tl-date{font-family:"JetBrains Mono",monospace;font-size:7px;color:var(--goldD);width:80px;flex-shrink:0;padding-top:2px}
.tl-line{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;padding-top:4px}
.tl-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--gold);background:var(--goldW);flex-shrink:0}
.tl-connector{width:1px;background:var(--wire);flex:1;min-height:20px}
.tl-body{}
.tl-label{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;color:#ede8df}
.tl-desc{font-family:"JetBrains Mono",monospace;font-size:7.5px;color:#635e58;line-height:1.6;margin-top:2px}
/* IOI Form */
.ioi-form{background:linear-gradient(135deg,rgba(197,165,114,.07),rgba(197,165,114,.03));border:1px solid var(--goldBd);padding:16px 18px;margin-bottom:14px}
.ioi-form::before{content:"";display:block;height:2px;background:linear-gradient(to right,var(--gold),var(--goldD),transparent 70%);margin:-16px -18px 14px;opacity:.5}
.ioi-title{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.ioi-range{display:flex;gap:8px;margin-bottom:10px}
.ioi-range-btn{flex:1;padding:9px 5px;font-family:"JetBrains Mono",monospace;font-size:9px;text-align:center;cursor:pointer;transition:all .14s;border:1px solid var(--wire);color:#635e58;min-height:44px}
.ioi-range-btn:hover,.ioi-range-btn.sel{border-color:var(--goldBd);color:var(--gold);background:var(--goldW)}
.ioi-lbl{font-family:"JetBrains Mono",monospace;font-size:6.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--goldD);display:block;margin-bottom:5px;margin-top:10px}
.ioi-inp{width:100%;padding:9px 12px;font-size:13px}
.ioi-ack{display:flex;align-items:flex-start;gap:8px;margin-top:9px;font-family:"JetBrains Mono",monospace;font-size:7.5px;color:#635e58;line-height:1.6;cursor:pointer}
.ioi-ack input[type=checkbox]{width:14px;height:14px;flex-shrink:0;margin-top:1px;accent-color:var(--gold)}
.ioi-btn{width:100%;margin-top:14px;padding:12px;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#060605;background:var(--gold);border:none;cursor:pointer;transition:all .14s;min-height:44px}
.ioi-btn:hover{background:var(--goldB);box-shadow:0 0 16px rgba(197,165,114,.35)}
.ioi-btn:disabled{opacity:.5;cursor:default;box-shadow:none}
.ioi-submitted{background:rgba(90,158,114,.08);border:1px solid var(--greenBd);padding:12px 14px;font-family:"JetBrains Mono",monospace;font-size:8px;color:var(--green);line-height:1.7}
/* Doc hub */
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);gap:8px;min-height:44px}
.doc-row:last-child{border-bottom:0}
.doc-name-b{font-family:"JetBrains Mono",monospace;font-size:8.5px;color:#ede8df}
.doc-type-b{font-family:"JetBrains Mono",monospace;font-size:6.5px;color:#635e58;margin-top:2px}
.doc-badge{font-family:"JetBrains Mono",monospace;font-size:5.5px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid}
.doc-locked{border-color:var(--wire);color:#635e58}
.doc-unlocked{border-color:var(--goldBd);color:var(--gold);background:var(--goldW)}
.doc-dl-btn{font-family:"JetBrains Mono",monospace;font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border:1px solid;cursor:pointer;transition:all .14s;min-height:34px}
.doc-dl-active{color:var(--gold);border-color:var(--goldBd);background:var(--goldW)}
.doc-dl-active:hover{background:rgba(197,165,114,.15)}
.doc-dl-locked{color:#635e58;border-color:var(--wire)}
/* Portfolio tab */
.portfolio-wrap{padding:0}
.port-hd{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);padding:12px 18px;border-bottom:1px solid var(--wire)}
.port-row{display:grid;grid-template-columns:1.8fr .7fr .7fr .7fr .7fr;align-items:center;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04);gap:8px;font-family:"JetBrains Mono",monospace;font-size:8px;min-height:44px}
.port-hd-row{background:#111;border-bottom:1px solid var(--wire)!important;font-size:6.5px;color:#635e58;letter-spacing:.1em;text-transform:uppercase}
.port-row:hover{background:rgba(197,165,114,.025);cursor:pointer}
.port-status{font-family:"JetBrains Mono",monospace;font-size:6px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid}
.ps-pending{color:var(--amber);border-color:var(--amberBd);background:var(--amberW)}
.ps-approved{color:var(--green);border-color:var(--greenBd);background:var(--greenW)}
.ps-rejected{color:var(--red);border-color:var(--redBd);background:var(--redW)}
/* RESPONSIVE */
@media(max-width:900px){
  .nav-tabs{display:none}
  .nav-hamburger{display:flex}
  .deal-rail{display:none;position:fixed;top:90px;left:0;width:280px;height:calc(100% - 90px);z-index:40;border-right:1px solid var(--goldBd);box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .deal-rail.open{display:flex}
  #rail-toggle{display:block}
}
@media(max-width:640px){
  .ov-grid{grid-template-columns:1fr}
  .metrics-row{overflow-x:auto}
  .port-row{grid-template-columns:1.4fr .6fr .6fr}
  .port-row span:nth-child(4),.port-row span:nth-child(5){display:none}
  .port-hd-row span:nth-child(4),.port-hd-row span:nth-child(5){display:none}
}
</style>
</head>
<body>
<div id="session-expired"><div class="se-box"><div class="se-title">Session Expired</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#635e58;margin-bottom:16px;line-height:1.7">Your session has expired. Please sign in again.</div><button class="se-btn" onclick="window.location.href='/login'">Sign In Again &#8594;</button></div></div>

<div class="nav">
  <div class="nav-mark">P</div>
  <div style="margin-right:12px">
    <div class="nav-brand-name"><span>Prism</span></div>
    <div class="nav-brand-tag">Investor Marketplace</div>
  </div>
  <div class="nav-tabs">
    <button class="ntab on" onclick="showView('browse',this)">Browse Deals</button>
    <button class="ntab" onclick="showView('portfolio',this)">My Portfolio</button>
  </div>
  <div class="nav-r">
    <span class="nav-chip" id="firm-chip">Loading&#8230;</span>
    <button class="nav-ghost" onclick="doLogout()">Exit &#8594;</button>
  </div>
  <div class="nav-hamburger" onclick="document.getElementById('mob-nav').classList.toggle('on')" aria-label="Menu">
    <span></span><span></span><span></span>
  </div>
</div>
<div class="mob-nav" id="mob-nav">
  <div class="mob-tab on" onclick="showView('browse',this);document.getElementById('mob-nav').classList.remove('on')">Browse Deals</div>
  <div class="mob-tab" onclick="showView('portfolio',this);document.getElementById('mob-nav').classList.remove('on')">My Portfolio</div>
  <div class="mob-tab" onclick="doLogout()">Exit &#8594;</div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button id="rail-toggle" style="display:none;font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);padding:4px 8px;border:1px solid var(--goldBd);background:var(--goldW);margin-right:6px;min-height:28px" onclick="document.getElementById('deal-rail').classList.toggle('open')">Deals &#9662;</button>
  <button class="fp on" onclick="setFilter('all',this)">All</button>
  <button class="fp off" onclick="setFilter('credit',this)">Credit</button>
  <button class="fp off" onclick="setFilter('pe',this)">Pre-IPO</button>
  <button class="fp off" onclick="setFilter('re',this)">Real Estate</button>
  <button class="fp off" onclick="setFilter('infra',this)">Infrastructure</button>
  <div class="filter-sep"></div>
  <span class="filter-count" id="deal-count">Loading&#8230;</span>
</div>

<div id="app" style="display:flex;flex:1;overflow:hidden">
  <div class="deal-rail" id="deal-rail">
    <div class="rail-search"><input class="rail-inp" type="text" placeholder="SEARCH DEALS&#8230;" oninput="S.q=this.value;renderRail()"></div>
    <div id="rail-list" style="overflow-y:auto;flex:1"></div>
  </div>
  <div class="deal-detail" id="deal-detail">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#635e58">
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:52px;color:rgba(197,165,114,.15);animation:glow 3s ease-in-out infinite">◆</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase">Select a deal to view details</div>
    </div>
  </div>
</div>

<!-- PORTFOLIO VIEW (hidden by default) -->
<div id="portfolio-view" style="display:none;flex:1;overflow-y:auto;flex-direction:column">
  <div class="portfolio-wrap">
    <div class="port-hd">&#9670; My Indication of Interest Log</div>
    <div class="port-hd-row port-row"><span>Deal</span><span>Amount</span><span>Status</span><span>Submitted</span><span>Data Room</span></div>
    <div id="port-rows"><div style="padding:24px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:8px;color:#635e58">Loading&#8230;</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const fmU=n=>{if(!n||n<1)return"&#8212;";if(n>=1e9)return"$"+(n/1e9).toFixed(1)+"B";if(n>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"K";return"$"+n};
function toast(msg,k=""){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show "+k;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2800)}
function showSessionExpired(){document.getElementById("session-expired").classList.add("on")}

const S={deals:[],iois:{},sel:null,filter:"all",q:"",inst:null,detailTab:"overview"};
const LABELS={credit:"Private Credit",pe:"Pre-IPO Equity",re:"Real Estate",infra:"Infrastructure"};

async function api(method,url,body){
  const opts={method,credentials:"include",headers:{}};
  if(body){opts.headers["Content-Type"]="application/json";opts.body=JSON.stringify(body);}
  try{
    const r=await fetch(url,opts);
    if(r.status===401){showSessionExpired();return null;}
    return r.json();
  }catch{toast("Connection error","err");return null;}
}

async function doLogout(){await api("POST","/api/logout");window.location.href="/login"}

function showView(view,btn){
  document.querySelectorAll(".ntab,.mob-tab").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  const app=document.getElementById("app");
  const port=document.getElementById("portfolio-view");
  const filterBar=document.querySelector(".filter-bar");
  if(view==="browse"){
    app.style.display="flex";port.style.display="none";filterBar.style.display="flex";
  } else {
    app.style.display="none";port.style.display="flex";filterBar.style.display="none";
    loadMyIois();
  }
}

function setFilter(f,btn){
  S.filter=f;
  document.querySelectorAll(".filter-bar .fp").forEach(b=>{b.className="fp off"});
  btn.className="fp on";
  renderRail();
}

async function load(){
  let me=await api("GET","/api/v2?resource=inst&op=me");
  if(!me?.ok){
    const adminMe=await api("GET","/api/me");
    if(adminMe?.ok&&adminMe.role==="admin"){
      S.inst={firm_name:"Operator Preview",email:adminMe.email,status:"approved"};
      S.adminPreview=true;
      const chip=document.getElementById("firm-chip");
      chip.textContent="Operator Preview";chip.style.color="var(--amber)";chip.style.borderColor="rgba(184,131,58,.3)";
      const nav=document.querySelector(".nav");
      const b=document.createElement("div");
      b.style.cssText="background:rgba(184,131,58,.08);border-bottom:1px solid rgba(184,131,58,.2);padding:5px 16px;font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--amber);letter-spacing:.14em;text-transform:uppercase;flex-shrink:0;display:flex;align-items:center;justify-content:space-between";
      b.innerHTML='<span>&#11042; Operator Preview &#8212; viewing as admin. IOI submission disabled.</span><button onclick="window.location.href='/control'" style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--amber);padding:3px 8px;border:1px solid rgba(184,131,58,.3);background:transparent;cursor:pointer">&#8592; Control Panel</button>';
      nav.insertAdjacentElement("afterend",b);
    } else { window.location.href="/login";return; }
  } else {
    S.inst=me.inst;
    document.getElementById("firm-chip").textContent=me.inst.firm_name||me.inst.email;
    document.title="Aurum Prism · "+me.inst.firm_name;
  }
  const d=await api("GET","/api/v2?resource=deals&op=marketplace");
  if(!d?.ok){toast("Failed to load deals","err");return;}
  S.deals=d.deals||[];
  renderRail();
  if(!S.adminPreview)loadMyIois();
}

async function loadMyIois(){
  const d=await api("GET","/api/v2?resource=marketplace&op=my-iois");
  if(!d?.ok)return;
  S.iois={};
  (d.iois||[]).forEach(i=>{S.iois[i.deal_id]=i;});
  // Re-render portfolio if open
  renderPortfolio();
}

function renderRail(){
  const items=S.deals.filter(d=>{
    if(S.filter!=="all"&&d.asset_class!==S.filter)return false;
    if(S.q&&!d.name.toLowerCase().includes(S.q.toLowerCase()))return false;
    return true;
  });
  document.getElementById("deal-count").textContent=items.length+" deal"+(items.length!==1?"s":"");
  const list=document.getElementById("rail-list");
  list.innerHTML=items.map(d=>{
    const pct=d.target_alloc_usd>0?Math.min(100,Math.round((d.ioi_agg_usd||0)/d.target_alloc_usd*100)):0;
    const overSub=pct>=100;
    const myIoi=S.iois[d.id];
    const bc={"credit":"badge-credit","pe":"badge-pe","re":"badge-re","infra":"badge-infra"}[d.asset_class]||"";
    return`<div class="deal-card${S.sel===d.id?" sel":""}" onclick="selectDeal('${d.id}')">
      <div class="dc-inner">
        <div class="dc-name">${d.name}</div>
        <div class="dc-badges">
          <span class="badge ${bc}">${LABELS[d.asset_class]||d.asset_class}</span>
          ${myIoi?`<span class="badge badge-ioi">IOI &#10003;</span>`:""}
          ${overSub?`<span class="badge badge-live">FULL</span>`:""}
        </div>
      </div>
      <div class="dc-metrics">
        <div class="dc-metric"><div class="dc-metric-l">IRR</div><div class="dc-metric-v">${d.target_irr||"&#8212;"}%</div></div>
        <div class="dc-metric"><div class="dc-metric-l">Alloc</div><div class="dc-metric-v">${fmU(d.target_alloc_usd)}</div></div>
      </div>
      <div class="dc-bar"><div class="dc-fill" style="width:${pct}%;background:${overSub?"var(--green)":"var(--gold)"}"></div></div>
    </div>`;
  }).join("") || `<div style="padding:24px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:8px;color:#635e58">No matching deals</div>`;
}

function renderPortfolio(){
  const rows=document.getElementById("port-rows");
  if(!rows)return;
  const iois=Object.values(S.iois);
  if(!iois.length){rows.innerHTML=`<div style="padding:24px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:8px;color:#635e58">No IOIs submitted yet. Browse deals and submit an indication of interest to track them here.</div>`;return;}
  rows.innerHTML=iois.map(i=>{
    const deal=S.deals.find(d=>d.id===i.deal_id);
    const sc={pending:"ps-pending",approved:"ps-approved",rejected:"ps-rejected"}[i.status]||"ps-pending";
    return`<div class="port-row" onclick="selectDeal('${i.deal_id}');showView('browse',null)">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600">${deal?.name||i.deal_id}</span>
      <span style="color:var(--gold);font-weight:500">${fmU(i.amount)}</span>
      <span><span class="port-status ${sc}">${i.status.toUpperCase()}</span></span>
      <span style="color:#635e58">${i.submitted_at?new Date(i.submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"&#8212;"}</span>
      <span style="color:${i.data_room_access?"var(--green)":"#635e58"}">${i.data_room_access?"&#9679; Open":"&#9675; Gated"}</span>
    </div>`;
  }).join("");
}

function selectDeal(id){
  S.sel=id;S.detailTab="overview";
  renderRail();
  renderDetail();
  // Close mobile rail
  document.getElementById("deal-rail").classList.remove("open");
}

function renderDetail(){
  const d=S.deals.find(x=>x.id===S.sel);
  const wrap=document.getElementById("deal-detail");
  if(!d){wrap.innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#635e58"><div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:52px;color:rgba(197,165,114,.15)">&#9670;</div><div style="font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase">Select a deal</div></div>`;return;}
  const myIoi=S.iois[d.id];
  const pct=d.target_alloc_usd>0?Math.min(100,Math.round((d.ioi_agg_usd||0)/d.target_alloc_usd*100)):0;
  const overSub=pct>=100;
  const closingDate=d.closing_date?new Date(d.closing_date):null;
  const daysLeft=closingDate?Math.ceil((closingDate-Date.now())/(1000*60*60*24)):null;
  const tc={"credit":"color:var(--blue);border-color:var(--blueBd)","pe":"color:var(--gold);border-color:var(--goldBd)","re":"color:var(--green);border-color:var(--greenBd)","infra":"color:#a89f94;border-color:var(--wire)"}[d.asset_class]||"";
  const tabs=["overview","highlights","timeline","ioi","documents"];
  wrap.innerHTML=`
    <div class="dd-hdr">
      <div class="dd-tag-row">
        <span class="dd-asset-tag" style="${tc}">${LABELS[d.asset_class]||d.asset_class||"DEAL"}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:.16em;color:#635e58;text-transform:uppercase;padding:3px 8px;border:1px solid var(--wire)">${d.geography||"&#8212;"}</span>
        ${myIoi?`<span style="font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--greenBd);color:var(--green);background:var(--greenW)">&#10003; IOI Submitted</span>`:""}
        ${overSub?`<span style="font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--amberBd);color:var(--amber);background:var(--amberW)">OVERSUBSCRIBED</span>`:""}
      </div>
      <div class="dd-title">${d.name.split(" ").slice(0,-1).join(" ")} <span>${d.name.split(" ").slice(-1)[0]}</span></div>
      <div class="dd-sub">${d.originator||""} ${d.deal_structure?`&#183; ${d.deal_structure}`:""}</div>
      <div class="metrics-row">
        <div class="mr-metric"><div class="mr-lbl">Target IRR</div><div class="mr-val">${d.target_irr||"&#8212;"}%</div><div class="mr-sub">Annualised</div></div>
        <div class="mr-metric"><div class="mr-lbl">Allocation</div><div class="mr-val">${fmU(d.target_alloc_usd)}</div><div class="mr-sub">${overSub?"Oversubscribed":pct+"% indicated"}</div></div>
        <div class="mr-metric"><div class="mr-lbl">Term</div><div class="mr-val">${d.term_months||"&#8212;"}<span style="font-size:12px;color:#635e58">mo</span></div><div class="mr-sub">${d.term_months?((d.term_months/12).toFixed(1)+" yr"):"&#8212;"}</div></div>
        <div class="mr-metric"><div class="mr-lbl">Min Ticket</div><div class="mr-val">${fmU(d.min_ticket_usd||50000)}</div><div class="mr-sub">USD hard capital</div></div>
        <div class="mr-metric"><div class="mr-lbl">IOIs</div><div class="mr-val" style="color:var(--amber)">${d.ioi_count||0}</div><div class="mr-sub">${fmU(d.ioi_agg_usd||0)} total</div></div>
      </div>
    </div>
    ${daysLeft&&daysLeft>0?`<div class="countdown-strip">&#9654; Closing: ${d.closing_date} &nbsp;&#183;&nbsp; ${daysLeft} day${daysLeft!==1?"s":""} remaining</div>`:""}
    <div class="dtabs">${tabs.map(t=>`<button class="dtab${S.detailTab===t?" on":""}" onclick="S.detailTab='${t}';renderDetail()">${t.toUpperCase()}</button>`).join("")}</div>
    <div class="dtab-body" id="dtab-body">${buildDetailTab(d,S.detailTab)}</div>`;
}

function buildDetailTab(d,tab){
  if(tab==="overview")return buildOverview(d);
  if(tab==="highlights")return buildHighlights(d);
  if(tab==="timeline")return buildTimeline(d);
  if(tab==="ioi")return buildIoi(d);
  if(tab==="documents")return buildDocs(d);
  return "";
}

function buildOverview(d){
  return`<div class="ov-grid">
    <div class="ov-block"><div class="ov-lbl">Overview</div><div class="ov-text">${d.mk_notes||"No description available."}</div></div>
    <div class="ov-block"><div class="ov-lbl">Deal Terms</div><div class="ov-text">
      <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="color:#635e58">Structure</span><span>${d.deal_structure||"&#8212;"}</span></div>
      <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="color:#635e58">Target IRR</span><span style="color:var(--gold)">${d.target_irr||"&#8212;"}%</span></div>
      <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="color:#635e58">Hurdle Rate</span><span>${d.hurdle_rate||8}%</span></div>
      <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="color:#635e58">Term</span><span>${d.term_months||"&#8212;"} months</span></div>
      <div style="display:flex;justify-content:space-between;padding:3px 0"><span style="color:#635e58">Platform Fee</span><span>${d.tacc_platform_fee_pct||1}% of allocation</span></div>
    </div></div>
  </div>`;
}

function buildHighlights(d){
  const hls=d.highlights||[];
  if(!hls.length)return`<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#635e58;padding:24px;text-align:center">No highlights available.</div>`;
  return`<div style="border:1px solid var(--wire)">${hls.map(h=>`<div class="hl-item"><div class="hl-dot">&#9670;</div><div><div class="hl-s">${h.s}</div><div class="hl-b">${h.b}</div></div></div>`).join("")}</div>`;
}

function buildTimeline(d){
  const tl=d.timeline||[];
  if(!tl.length)return`<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#635e58;padding:24px;text-align:center">Timeline not yet published.</div>`;
  return`<div>${tl.map((t,i)=>`<div class="tl-item"><div class="tl-date">${t.date||"&#8212;"}</div><div class="tl-line"><div class="tl-dot"></div>${i<tl.length-1?`<div class="tl-connector"></div>`:""}</div><div class="tl-body"><div class="tl-label">${t.label||"&#8212;"}</div>${t.desc?`<div class="tl-desc">${t.desc}</div>`:""}</div></div>`).join("")}</div>`;
}

function buildIoi(d){
  const myIoi=S.iois[d.id];
  if(myIoi){
    const sc={pending:"color:var(--amber)",approved:"color:var(--green)",rejected:"color:var(--red)"}[myIoi.status]||"";
    return`<div class="ioi-submitted">
      &#10003; IOI submitted &#8212; ${fmU(myIoi.amount)} indication<br>
      Status: <strong style="${sc}">${myIoi.status.toUpperCase()}</strong><br>
      ${myIoi.data_room_access?`<span style="color:var(--green)">&#9679; Data room access granted &#8212; documents tab is unlocked</span>`:"Awaiting operator review for data room access."}
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:7.5px;color:#635e58;margin-top:10px;line-height:1.7">Your IOI has been recorded. The platform operator will review and grant data room access if appropriate. IOI submitted ${myIoi.submitted_at?new Date(myIoi.submitted_at).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):"&#8212;"}.</div>`;
  }
  const minT=d.min_ticket_usd||50000;
  const ranges=[fmU(minT),fmU(minT*2),fmU(minT*5),fmU(minT*10)];
  return`<div class="ioi-form">
    <div class="ioi-title">&#9670; Submit Indication of Interest</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:7.5px;color:#635e58;margin-bottom:10px;line-height:1.7">An IOI is a non-binding expression of interest. Submission triggers a review for data room access. Minimum: ${fmU(minT)}.</div>
    <label class="ioi-lbl">Quick Select Amount</label>
    <div class="ioi-range">
      ${ranges.map((r,i)=>`<div class="ioi-range-btn" onclick="document.getElementById('ioi-amt').value='${[minT,minT*2,minT*5,minT*10][i]}';this.parentNode.querySelectorAll('.ioi-range-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">${r}</div>`).join("")}
    </div>
    <label class="ioi-lbl">Exact Amount (USD)</label>
    <input class="ioi-inp" id="ioi-amt" type="number" min="${minT}" step="50000" placeholder="${minT}">
    <label class="ioi-lbl">Notes (optional)</label>
    <textarea class="ioi-inp" id="ioi-notes" rows="2" placeholder="Any relevant context&#8230;" style="height:52px;resize:none;padding:8px;width:100%"></textarea>
    <div class="ioi-ack"><input type="checkbox" id="ack1"><label for="ack1">This is a non-binding indication of interest only. No commitment is made at this stage.</label></div>
    <div class="ioi-ack"><input type="checkbox" id="ack2"><label for="ack2">I am a qualified institutional investor and I have reviewed the information available on this deal.</label></div>
    <div class="ioi-ack"><input type="checkbox" id="ack3"><label for="ack3">I understand that data room access is subject to platform operator approval and is not automatic upon IOI submission.</label></div>
    <button class="ioi-btn" id="ioi-submit-btn" onclick="submitIoi('${d.id}',${minT})">Submit Indication of Interest &#8594;</button>
  </div>`;
}

async function submitIoi(dealId,minT){
  const amt=parseFloat(document.getElementById("ioi-amt")?.value||0);
  const notes=document.getElementById("ioi-notes")?.value||"";
  const ack1=document.getElementById("ack1")?.checked;
  const ack2=document.getElementById("ack2")?.checked;
  const ack3=document.getElementById("ack3")?.checked;
  if(!amt||amt<minT){toast("Amount must be at least "+fmU(minT),"err");return;}
  if(!ack1||!ack2||!ack3){toast("Please check all acknowledgments","err");return;}
  const btn=document.getElementById("ioi-submit-btn");
  if(btn){btn.disabled=true;btn.textContent="Submitting&#8230;";}
  const r=await api("POST","/api/v2?resource=marketplace&op=ioi",{deal_id:dealId,amount:amt,notes});
  if(r?.ok){
    toast("IOI submitted successfully","ok");
    await loadMyIois();
    S.detailTab="ioi";
    renderDetail();
  } else {
    toast(r?.error||"Failed to submit","err");
    if(btn){btn.disabled=false;btn.textContent="Submit Indication of Interest &#8594;";}
  }
}

function buildDocs(d){
  const myIoi=S.iois[d.id];
  const hasAccess=myIoi?.data_room_access;
  const docs=d.docs||[];
  const defaultDocs=[
    {n:"Executive Summary",t:"PDF",acc:"pub"},{n:"Investor Presentation",t:"PDF",acc:"pub"},
    {n:"Confidential Information Memorandum",t:"PDF",acc:"gated"},{n:"Financial Model",t:"XLSX",acc:"gated"},
    {n:"Legal Due Diligence Report",t:"PDF",acc:"gated"},{n:"Audited Financials",t:"PDF",acc:"gated"},
  ];
  const displayDocs=docs.length?docs:defaultDocs;
  return`<div style="border:1px solid var(--wire)">
    <div style="padding:9px 12px;background:#111;border-bottom:1px solid var(--wire);font-family:'JetBrains Mono',monospace;font-size:6.5px;color:#635e58;letter-spacing:.1em;text-transform:uppercase">
      ${hasAccess?`<span style="color:var(--green)">&#9679; Data Room Open &#8212; all documents unlocked</span>`:`<span style="color:#635e58">&#9675; Submit an IOI and receive operator approval to unlock gated documents</span>`}
    </div>
    ${displayDocs.map(doc=>{
      const pub=(doc.acc||doc.access)==="pub";
      const canDl=pub||hasAccess;
      return`<div class="doc-row">
        <div><div class="doc-name-b">${doc.n||doc.name}</div><div class="doc-type-b">${doc.t||doc.type||"PDF"}</div></div>
        <span class="doc-badge ${canDl?"doc-unlocked":"doc-locked"}">${pub?"PUBLIC":hasAccess?"UNLOCKED":"GATED"}</span>
        ${canDl&&doc.url?`<button class="doc-dl-btn doc-dl-active" onclick="window.open('${doc.url}','_blank')">&#8595; Download</button>`
          :canDl?`<button class="doc-dl-btn doc-dl-active" onclick="toast('Document not yet uploaded by operator.')">&#8595; Download</button>`
          :`<span class="doc-dl-btn doc-dl-locked">&#128274; Locked</span>`}
      </div>`;
    }).join("")}
  </div>
  ${!hasAccess&&!S.iois[d.id]?`<div style="font-family:'JetBrains Mono',monospace;font-size:7.5px;color:#635e58;margin-top:8px;line-height:1.7;padding:9px 12px;border:1px solid var(--wire);background:#0c0c0a">To unlock gated documents, submit an IOI via the IOI tab. Operator review typically takes 1&#8211;2 business days.</div>`:""}`;
}

// Init
load();
</script>
</body>
</html>
