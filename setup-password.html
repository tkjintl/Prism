<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurum Prism · Set Your Password</title><meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=JetBrains+Mono:wght@400;500&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060605;--surface:#0e0d0c;--input-bg:#09090a;
  --gold:#C5A572;--goldB:#DEB97A;--goldD:#8a7c68;
  --goldBd:rgba(197,165,114,.22);--goldBdS:rgba(197,165,114,.5);--goldW:rgba(197,165,114,.06);
  --red:#b05e56;--redBd:rgba(176,94,86,.26);--redW:rgba(176,94,86,.07);
  --amber:#b8833a;--amberBd:rgba(184,131,58,.28);--amberW:rgba(184,131,58,.07);
  --wire:rgba(255,255,255,.06);--muted:#635e58;--text:#ede8df;
  --serif:'Cormorant Garamond',serif;--cond:'Barlow Condensed',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.box{width:380px;background:var(--surface);border:1px solid var(--goldBd);padding:32px}
.seal{width:32px;height:32px;border:1px solid var(--goldBd);background:var(--goldW);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--gold);margin:0 auto 14px}
.title{font-family:var(--cond);font-size:20px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text);text-align:center;margin-bottom:6px}
.sub{font-family:var(--mono);font-size:7.5px;color:var(--muted);text-align:center;line-height:1.75;margin-bottom:20px}
.notice{font-family:var(--mono);font-size:8px;color:var(--amber);background:var(--amberW);border:1px solid var(--amberBd);padding:9px 12px;margin-bottom:16px;line-height:1.6}
.lbl{font-family:var(--mono);font-size:6.5px;letter-spacing:.22em;color:var(--goldD);text-transform:uppercase;display:block;margin-bottom:5px;margin-top:12px}
input{width:100%;padding:10px 12px;font-family:var(--mono);font-size:12px;background:var(--input-bg);color:var(--text);border:1px solid var(--wire);outline:none;transition:border-color .15s}
input:focus{border-color:var(--goldBdS)}
.strength{height:3px;background:#282523;margin-top:4px;overflow:hidden}
.strength-fill{height:100%;width:0%;transition:all .25s}
.strength-lbl{font-family:var(--mono);font-size:6.5px;color:var(--muted);margin-top:3px}
.btn{width:100%;margin-top:16px;padding:11px;font-family:var(--cond);font-size:14px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--bg);background:var(--gold);border:none;cursor:pointer;transition:background .14s}
.btn:hover{background:var(--goldB)}
.err{font-family:var(--mono);font-size:8px;color:var(--red);background:var(--redW);border:1px solid var(--redBd);padding:8px 11px;margin-top:10px;display:none}
.err.on{display:block}

/* MOBILE-PASS — additive only, scoped ≤768px. Desktop excluded mathematically. */
@media (max-width: 768px) {
  input, select, textarea { font-size: 16px; }
}
@media (max-width: 768px) {
  html, body { overflow-x: hidden; max-width: 100vw; }
  .box { max-width: 100% !important; width: calc(100vw - 32px) !important; box-sizing: border-box; margin-left: auto; margin-right: auto; }
}
@media (max-width: 768px) and (hover: none) and (pointer: coarse) {
  body { padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; }
}
</style>
</head><body>
<div class="box">
  <div class="seal"><em style="font-family:Georgia,serif;font-style:italic;font-size:15px;letter-spacing:-.04em;font-weight:500">Au</em></div>
  <div class="title">Set Your Password</div>
  <div class="sub">Welcome to Aurum Prism. Set a permanent password to secure your advisor account.</div>
  <div class="notice">⚠ You received a temporary password to access this page. This step replaces it with your own permanent password.</div>
  <label class="lbl">New Password</label>
  <input id="pw" type="password" placeholder="Minimum 8 characters" oninput="checkStrength(this.value)">
  <div class="strength"><div class="strength-fill" id="sf"></div></div>
  <div class="strength-lbl" id="sl">Enter a password</div>
  <label class="lbl">Confirm Password</label>
  <input id="cpw" type="password" placeholder="Repeat password" onkeydown="if(event.key==='Enter')submit()">
  <div class="err" id="err"></div>
  <button class="btn" id="btn" onclick="submit()">Set Password & Enter Portal →</button>
</div>
<script>
function checkStrength(pw){
  const el=document.getElementById('sf'),lbl=document.getElementById('sl');
  let score=0;
  if(pw.length>=8)score++;if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
  const pct=Math.min(100,score*20)+'%';
  const colors=['#635e58','#b05e56','#b8833a','#b8833a','#5a9e72','#5a9e72'];
  const labels=['Enter a password','Too short','Weak','Fair','Good','Strong'];
  el.style.width=pct;el.style.background=colors[score];lbl.textContent=labels[score];lbl.style.color=colors[score];
}
function showErr(msg){const e=document.getElementById('err');e.textContent=msg;e.classList.add('on')}
async function submit(){
  document.getElementById('err').classList.remove('on');
  const pw=document.getElementById('pw').value;
  const cpw=document.getElementById('cpw').value;
  const setup_token=sessionStorage.getItem('prism_setup_token');
  if(!setup_token){showErr('Session expired — please log in again');setTimeout(()=>window.location.href='/login',2000);return;}
  if(!pw||pw.length<8){showErr('Password must be at least 8 characters');return;}
  if(pw!==cpw){showErr('Passwords do not match');return;}
  document.getElementById('btn').disabled=true;document.getElementById('btn').textContent='Setting password…';
  try{
    const r=await fetch('/api/v2?resource=advisor&op=setup-password',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({setup_token,password:pw})});
    const d=await r.json();
    if(!d.ok){showErr(d.error||'Error setting password');document.getElementById('btn').disabled=false;document.getElementById('btn').textContent='Set Password & Enter Portal →';return;}
    sessionStorage.removeItem('prism_setup_token');
    window.location.href='/advisor-portal';
  }catch{showErr('Connection error — try again');document.getElementById('btn').disabled=false;document.getElementById('btn').textContent='Set Password & Enter Portal →';}
}
// Verify we have a setup token
if(!sessionStorage.getItem('prism_setup_token')){
  document.querySelector('.box').innerHTML='<div style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:8px;color:#635e58;padding:20px">No setup session found. <a href="/login" style="color:#C5A572">Return to login</a>.</div>';
}
</script>
</body></html>
