<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurum Prism · Page not on the register</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#070706">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070706;--bg2:#0a0908;
  --text:#ece6da;--sub:#a89f94;--muted:#655f58;
  --gold:#C5A572;--goldB:#DEB97A;--goldD:#8a7c68;
  --goldBd:rgba(197,165,114,0.22);
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}
.watermark{
  position:absolute;
  top:28px;
  left:32px;
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
}
.watermark .au{color:var(--text)}
.watermark .rule{display:block;width:1px;height:10px;background:var(--goldBd)}
.watermark .pr{color:var(--gold)}
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 32px 40px;
}
.card{
  max-width:640px;
  width:100%;
  text-align:center;
}
.eyebrow{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:28px;
}
h1{
  font-family:var(--serif);
  font-style:italic;
  font-weight:400;
  font-size:clamp(36px,6vw,60px);
  line-height:1.1;
  color:var(--text);
  margin-bottom:24px;
  letter-spacing:-.005em;
}
.sub{
  font-size:15px;
  line-height:1.65;
  color:var(--sub);
  max-width:480px;
  margin:0 auto 40px;
}
.links{
  display:flex;
  gap:32px;
  justify-content:center;
  flex-wrap:wrap;
}
.links a{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold);
  text-decoration:none;
  border-bottom:1px solid var(--goldBd);
  padding-bottom:4px;
  transition:color .15s,border-color .15s;
}
.links a:hover{color:var(--goldB);border-color:var(--gold)}
footer{
  text-align:center;
  padding:24px 32px 28px;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--muted);
}
@media (max-width:480px){
  .watermark{top:20px;left:20px;font-size:9px}
  main{padding:90px 24px 32px}
  .links{gap:20px;flex-direction:column;align-items:center}
}
</style>
</head>
<body>
  <div class="watermark" aria-hidden="true">
    <span class="au">AURUM</span>
    <span class="rule"></span>
    <span class="pr">PRISM</span>
  </div>
  <main>
    <div class="card">
      <div class="eyebrow">Error 404</div>
      <h1>This room is not on the register.</h1>
      <p class="sub">The page you&rsquo;re looking for isn&rsquo;t part of Aurum Prism. If you believe this is in error, contact the operator.</p>
      <div class="links">
        <a href="/">Return to Aurum Prism &rarr;</a>
        <a href="/login">Member login &rarr;</a>
      </div>
    </div>
  </main>
  <footer>TACC Pte Ltd &middot; Singapore &middot; www.aurumprism.com</footer>
</body>
</html>
