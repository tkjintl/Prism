<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aurum Prism · Private Opportunities</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0908;--bg-2:#0F0E0C;--bg-3:#161412;--surface:#131210;
  --border:rgba(255,255,255,0.06);--border-m:rgba(255,255,255,0.11);
  --text:#EDE8DF;--text-2:#A09A91;--text-3:#6B665E;
  --gold:#C5A572;--gold-b:#E3C187;--gold-bg:rgba(197,165,114,0.07);--gold-bd:rgba(197,165,114,0.22);
  --green:#5a9e72;--green-bg:rgba(90,158,114,0.07);--green-bd:rgba(90,158,114,0.25);
  --amber:#b8833a;--amber-bg:rgba(184,131,58,0.08);--amber-bd:rgba(184,131,58,0.28);
  --red:#b05e56;--red-bg:rgba(176,94,86,0.07);--red-bd:rgba(176,94,86,0.22);
  --blue:#5b85b8;--blue-bg:rgba(91,133,184,0.07);--blue-bd:rgba(91,133,184,0.25);
  --slate:#7B8FA1;--slate-bg:rgba(123,143,161,0.07);--slate-bd:rgba(123,143,161,0.22);
  --purple:#8B72BE;--purple-bg:rgba(139,114,190,0.07);--purple-bd:rgba(139,114,190,0.22);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:6px;--nav-h:56px;--ease:cubic-bezier(0.22,1,0.36,1);
}
[data-theme="light"]{
  --bg:#F7F5F1;--bg-2:#FFFFFF;--bg-3:#EFECE6;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.07);--border-m:rgba(0,0,0,0.12);
  --text:#18160F;--text-2:#5A5449;--text-3:#9C968A;
  --gold:#A8813A;--gold-b:#C5A572;--gold-bg:rgba(168,129,58,0.07);--gold-bd:rgba(168,129,58,0.25);
  --green:#2E6E48;--green-bg:rgba(46,110,72,0.07);--green-bd:rgba(46,110,72,0.25);
  --amber:#8A5C1A;--amber-bg:rgba(138,92,26,0.08);--amber-bd:rgba(138,92,26,0.28);
  --red:#8B3228;--red-bg:rgba(139,50,40,0.07);--red-bd:rgba(139,50,40,0.22);
  --blue:#2B5C8A;--blue-bg:rgba(43,92,138,0.07);--blue-bd:rgba(43,92,138,0.25);
  --slate:#4A5E6E;--slate-bg:rgba(74,94,110,0.07);--slate-bd:rgba(74,94,110,0.22);
  --purple:#5B3E8A;--purple-bg:rgba(91,62,138,0.07);--purple-bd:rgba(91,62,138,0.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scroll-behavior:smooth}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit;background:var(--surface);border:1px solid var(--border-m);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border-m);border-radius:2px}

/* ── ANIMATIONS ── */
@keyframes fadeUp    {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes pulse     {0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer   {from{opacity:.5}to{opacity:1}}
@keyframes cardReveal{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
/* Prism-specific */
@keyframes beamPulse {0%,100%{opacity:.14}50%{opacity:.07}}
@keyframes raySpectrum{0%,100%{opacity:.85;transform:scaleX(1)}50%{opacity:.45;transform:scaleX(.97)}}
@keyframes vertexGlow{0%,100%{r:4px;opacity:.55}50%{r:3px;opacity:.25}}
@keyframes particleDrift{0%{transform:translate(0,0);opacity:.7}100%{transform:translate(10px,-8px);opacity:0}}
@keyframes breatheGlow{0%,100%{opacity:.04;transform:scaleX(1)}50%{opacity:.09;transform:scaleX(1.06)}}
@keyframes prismRotate{0%,100%{filter:drop-shadow(0 0 22px rgba(197,165,114,.06))}50%{filter:drop-shadow(0 0 38px rgba(197,165,114,.11))}}
@keyframes barGrow   {from{width:0}to{width:var(--bar-w)}}
@keyframes lockOpen  {0%{transform:rotate(0deg)}50%{transform:rotate(15deg)}100%{transform:rotate(0deg)}}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:none}}
@keyframes stepPop   {0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;display:flex;align-items:center;padding:0 24px;gap:16px;background:rgba(10,9,8,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.nav-mark{width:32px;height:32px;border:1px solid var(--gold-bd);background:var(--gold-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--gold)}
.nav-brand-name{font-family:var(--mono);font-size:8px;letter-spacing:.38em;text-transform:uppercase;color:var(--text);line-height:1}
.nav-brand-tag{font-family:var(--mono);font-size:6px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-top:2px}
.nav-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.nav-tabs{display:flex}
.ntab{padding:8px 14px;font-size:13px;font-weight:400;color:var(--text-3);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;font-family:var(--sans)}
.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ntab:hover:not(.on){color:var(--text-2)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-user-info{text-align:right}
.nav-user-name{font-size:12px;font-weight:500;color:var(--text);line-height:1}
.nav-user-type{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text-3);margin-top:1px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-bg);border:1px solid var(--gold-bd);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--gold);flex-shrink:0}
.theme-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-m);border-radius:50%;color:var(--text-2);font-size:16px;transition:all .2s;cursor:pointer;background:none;font-family:inherit}
.theme-btn:hover{border-color:var(--gold-bd);color:var(--gold)}

/* ── VIEWS ── */
.view{display:none;padding-top:var(--nav-h);min-height:100vh}
.view.active{display:block}

/* ══════════════════════════════════════════
   LOBBY
══════════════════════════════════════════ */
.lobby-hero{min-height:calc(100vh - var(--nav-h));display:grid;position:relative;overflow:hidden}
@media(min-width:900px){.lobby-hero{grid-template-columns:55% 45%}}
.hero-content{padding:clamp(44px,9vh,88px) clamp(24px,5vw,72px);display:flex;flex-direction:column;justify-content:center;animation:fadeUp .9s var(--ease) both;z-index:2;position:relative}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
.eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
.hero-deal-name{font-family:var(--serif);font-style:italic;font-size:clamp(42px,7vw,78px);font-weight:400;line-height:1.04;color:var(--text);margin-bottom:14px;letter-spacing:-.015em}
.hero-tagline{font-size:14px;font-weight:400;color:var(--text-2);max-width:480px;margin-bottom:28px;line-height:1.8;font-family:var(--sans)}
.hero-stats{display:flex;gap:0;margin-bottom:36px;flex-wrap:wrap}
.hero-stat{padding:0 22px 0 0;margin-right:22px;border-right:1px solid var(--border)}
.hero-stat:last-child{border-right:none;padding-right:0;margin-right:0}
.hero-stat-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);line-height:1;margin-bottom:4px}
.hero-stat-lbl{font-size:11px;color:var(--text-3);letter-spacing:.04em;font-family:var(--sans)}
.hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-primary{position:relative;overflow:hidden;padding:14px 28px;background:var(--gold);font-size:13px;font-weight:600;letter-spacing:.03em;border-radius:2px;transition:all .25s var(--ease);font-family:var(--sans)}
.btn-primary,html .btn-primary{color:#0A0908}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.15) 50%,transparent 70%);transform:translateX(-100%);transition:transform .6s}
.btn-primary:hover{background:var(--gold-b);transform:translateY(-2px);box-shadow:0 10px 28px rgba(197,165,114,.25)}
.btn-primary:hover::after{transform:translateX(100%)}
.btn-ghost{padding:13px 22px;border:1px solid var(--border-m);color:var(--text-2);font-size:13px;font-weight:500;border-radius:2px;transition:all .22s;font-family:var(--sans)}
.btn-ghost:hover{border-color:var(--gold-bd);color:var(--gold);background:var(--gold-bg)}

/* urgency badge */
.urgency-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(176,94,86,.12);border:1px solid rgba(176,94,86,.3);border-radius:20px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:16px}
.ub-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
.social-proof{display:flex;align-items:center;gap:8px;margin-top:18px;font-size:12px;color:var(--text-3);font-family:var(--sans)}
.sp-avatars{display:flex}
.sp-avatar{width:22px;height:22px;border-radius:50%;background:var(--bg-3);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:7px;font-weight:500;color:var(--text-3);margin-left:-6px}
.sp-avatar:first-child{margin-left:0}
.hero-sub-bar-wrap{position:absolute;bottom:0;left:0;right:0}
.hero-sub-bar-track{height:2px;background:var(--border)}
.hero-sub-bar-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-b));transition:width 2s var(--ease)}

/* ── HERO VISUAL (prism side) ── */
.hero-visual{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(197,165,114,.03) 0%,transparent 70%);min-height:360px;animation:fadeIn 1.2s .15s both}
@media(min-width:900px){.hero-visual{min-height:auto}}
.prism-svg-wrap{position:relative;width:min(360px,88%);animation:prismRotate 6s ease-in-out infinite}
.prism-svg{width:100%;height:auto}

/* ring floated over prism */
.ring-float{position:absolute;right:6%;bottom:10%}
.ring-wrap{position:relative}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-track{fill:none;stroke:var(--border);stroke-width:5}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.6s var(--ease),stroke .3s}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-pct{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);line-height:1}
.ring-sub{font-size:9px;color:var(--text-3);letter-spacing:.08em;margin-top:2px;font-family:var(--sans)}
.ring-detail-card{padding:11px 15px;background:rgba(13,12,10,.85);border:1px solid var(--border);border-radius:var(--r);font-size:11px;color:var(--text-2);margin-top:10px;backdrop-filter:blur(10px);animation:fadeUp .6s .8s both;font-family:var(--sans)}
.ring-detail-card strong{color:var(--text);font-weight:500}
.inv-row{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.inv-tag{padding:2px 7px;border-radius:20px;font-family:var(--mono);font-size:8px;border:1px solid var(--border);color:var(--text-3);background:var(--bg-3)}
.inv-tag.urgent{border-color:var(--red-bd);color:var(--red);background:var(--red-bg)}

/* ── DEAL GRID SECTION ── */
.section{padding:clamp(32px,5vh,56px) clamp(24px,5vw,72px)}
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;gap:12px}
.section-title{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--text)}
.section-count{font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:.14em;text-transform:uppercase}

/* deal cards */
.deal-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:600px){.deal-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1100px){.deal-grid{grid-template-columns:repeat(4,1fr)}}
.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .22s var(--ease);position:relative;opacity:0;transform:translateY(18px)}
.deal-card.revealed{animation:cardReveal .55s var(--ease) forwards}
.deal-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4);border-color:var(--border-m)}
.deal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:opacity .2s}
.dc-credit::before{background:var(--blue)}.dc-pe::before{background:var(--gold)}.dc-re::before{background:var(--green)}.dc-infra::before{background:var(--slate)}
.dc-header{padding:18px 18px 12px}
.dc-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dc-logo{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500;flex-shrink:0;border:1px solid}
.dc-class-tag{padding:3px 9px;border:1px solid;border-radius:20px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase}
.dct-credit{color:var(--blue);border-color:var(--blue-bd);background:var(--blue-bg)}
.dct-pe{color:var(--gold);border-color:var(--gold-bd);background:var(--gold-bg)}
.dct-re{color:var(--green);border-color:var(--green-bd);background:var(--green-bg)}
.dct-infra{color:var(--slate);border-color:var(--slate-bd);background:var(--slate-bg)}
.dc-irr{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
.dc-irr span{font-size:9px;color:var(--text-3);font-weight:400}
.dc-name{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.2;color:var(--text);margin-bottom:5px}
.dc-meta{font-size:12px;color:var(--text-3);margin-bottom:14px;font-family:var(--sans)}
.dc-body{padding:0 18px 16px}
.dc-bar-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:5px}
.dc-bar-fill{height:100%;border-radius:1px;width:0;transition:width 1s var(--ease)}
.dc-bar-row{display:flex;justify-content:space-between}
.dc-bar-sub{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.dc-bar-sub.hot{color:var(--red)}
.dc-footer{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-top:1px solid var(--border);background:var(--bg-3)}
.dc-ticket{font-size:12px;color:var(--text-3);font-family:var(--sans)}
.dc-ticket strong{font-family:var(--mono);font-weight:500;color:var(--text-2)}
.dc-cta{font-size:12px;color:var(--gold);font-weight:500;display:flex;align-items:center;gap:5px;transition:gap .18s;font-family:var(--sans)}
.deal-card:hover .dc-cta{gap:8px}
.dc-oversubscribed{position:absolute;top:12px;right:12px;padding:2px 8px;background:rgba(90,158,114,.15);border:1px solid var(--green-bd);border-radius:20px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--green)}

/* ══════════════════════════════════════════
   DEAL DETAIL (slide-in overlay)
══════════════════════════════════════════ */
#view-deal{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform .42s var(--ease)}
#view-deal.open{transform:none}
.dd-inner{max-width:1200px;margin:0 auto;padding:calc(var(--nav-h) + 28px) clamp(24px,5vw,72px) 100px}
.dd-back{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text-3);margin-bottom:28px;transition:color .15s;font-family:var(--sans)}
.dd-back:hover{color:var(--gold)}
.dd-grid{display:grid;grid-template-columns:1fr;gap:40px}
@media(min-width:900px){.dd-grid{grid-template-columns:1fr 360px}}

/* deal detail left */
.dd-identity{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px}
.dd-logo{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:500;flex-shrink:0;border:1px solid}
.dd-tag{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dd-name{font-family:var(--serif);font-style:italic;font-size:clamp(34px,5vw,60px);font-weight:400;line-height:1.06;color:var(--text);margin-bottom:16px}
.dd-thesis{font-size:14px;line-height:1.9;color:var(--text-2);margin-bottom:28px;max-width:600px;font-family:var(--sans)}

/* highlights */
.hl-cards{display:grid;gap:8px;margin-bottom:30px}
.hl-card{padding:15px 18px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);transition:border-color .18s,transform .18s;animation:fadeUp .5s var(--ease) both}
.hl-card:hover{border-color:var(--gold-bd);transform:translateX(3px)}
.hl-icon{font-size:16px;margin-bottom:6px}
.hl-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--sans)}
.hl-body{font-size:13px;color:var(--text-2);line-height:1.6;font-family:var(--sans)}

/* return chart */
.chart-section{margin-bottom:30px}
.chart-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.return-chart{display:flex;align-items:flex-end;gap:10px;height:120px;padding:0 4px}
.rc-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.rc-bar{width:100%;border-radius:3px 3px 0 0;transition:height 1.1s var(--ease);min-height:8px}
.rc-down{background:var(--border-m)}
.rc-base{background:linear-gradient(to top,var(--gold),rgba(197,165,114,.7))}
.rc-up{background:linear-gradient(to top,var(--gold-b),var(--gold))}
.rc-val{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.rc-lbl{font-size:11px;color:var(--text-3);font-family:var(--sans)}
.hurdle-line{position:relative;margin-top:6px;display:flex;align-items:center;gap:8px}
.hurdle-dash{flex:1;height:1px;background:var(--amber-bd);border-top:1px dashed var(--amber)}
.hurdle-lbl{font-family:var(--mono);font-size:9px;color:var(--amber);white-space:nowrap}

/* stage timeline */
.tl{margin-bottom:30px;overflow-x:auto;padding-bottom:8px}
.tl-inner{display:flex;align-items:center;min-width:420px}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative}
.tl-node:not(:last-child)::after{content:'';position:absolute;left:50%;right:-50%;top:11px;height:1px;background:var(--border);z-index:0}
.tl-node.done:not(:last-child)::after{background:var(--gold-bd)}
.tl-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1;transition:all .3s;font-family:var(--mono)}
.tl-node.done .tl-circle{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold)}
.tl-node.curr .tl-circle{background:var(--gold);border-color:var(--gold);color:#0A0908;box-shadow:0 0 0 4px var(--gold-bg);animation:shimmer 2s infinite alternate}
.tl-lbl{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);text-align:center}
.tl-node.done .tl-lbl{color:var(--text-2)}.tl-node.curr .tl-lbl{color:var(--gold)}

/* docs section */
.docs-section{margin-bottom:30px}
.docs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:600px){.docs-grid{grid-template-columns:repeat(3,1fr)}}
.doc-card{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:border-color .18s;position:relative}
.doc-card.locked{opacity:.55;cursor:default}
.doc-card.unlocked{cursor:pointer}
.doc-card.unlocked:hover{border-color:var(--gold-bd)}
.doc-card-icon{font-size:20px;margin-bottom:8px}
.doc-card-type{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.doc-card-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;font-family:var(--sans)}
.doc-card-size{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.doc-lock-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase}
.dlb-locked{color:var(--amber)}
.dlb-unlocked{color:var(--green)}

/* NDA gate */
.nda-gate{padding:18px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);margin-bottom:16px;animation:fadeUp .3s var(--ease)}
.nda-gate-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;font-family:var(--sans)}
.nda-gate-body{font-size:12px;color:var(--text-2);margin-bottom:12px;line-height:1.6;font-family:var(--sans)}
.nda-toggle-row{display:flex;align-items:flex-start;gap:10px}
.toggle-sw{position:relative;width:36px;height:20px;flex-shrink:0;margin-top:1px}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--border-m);border-radius:20px;cursor:pointer;transition:background .2s}
.toggle-sw input:checked+.tog-track{background:var(--gold)}
.tog-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.toggle-sw input:checked+.tog-track+.tog-thumb{transform:translateX(16px)}
.tog-text{font-size:12px;color:var(--text-2);line-height:1.55;font-family:var(--sans)}

/* ── ACTION PANEL (right column) ── */
.action-panel{position:relative}
.action-sticky{position:sticky;top:calc(var(--nav-h) + 20px);display:flex;flex-direction:column;gap:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stat-cell{padding:14px 16px;background:var(--surface)}
.stat-lbl{font-size:10px;color:var(--text-3);letter-spacing:.06em;margin-bottom:4px;font-family:var(--sans)}
.stat-val{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);line-height:1}
.stat-val.gold{color:var(--gold)}.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}
.stat-cell.full{grid-column:1/-1}
.panel-ring-row{display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg-3);border-radius:var(--r);border:1px solid var(--border)}
.panel-ring-info{flex:1}
.pri-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--sans)}
.pri-detail{font-size:12px;color:var(--text-2);line-height:1.5;font-family:var(--sans)}
.pri-detail em{font-style:normal;font-weight:500;color:var(--text)}

/* IOI form */
.ioi-form{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden}
.ioi-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between;font-family:var(--sans)}
.ioi-body{padding:18px}
.ioi-lbl{font-size:11px;color:var(--text-3);letter-spacing:.05em;margin-bottom:7px;display:block;font-family:var(--sans)}
.ioi-input{width:100%;padding:12px 14px;font-family:var(--mono);font-size:16px;font-weight:500;border-radius:2px;background:var(--bg-3);border:1px solid var(--border-m);color:var(--text);margin-bottom:8px}
.ioi-input:focus{border-color:var(--gold)}
.ioi-slider{width:100%;margin-bottom:6px;accent-color:var(--gold);cursor:pointer}
.slider-marks{display:flex;justify-content:space-between;margin-bottom:12px}
.sm{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.ioi-est{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--bg-3);border-radius:var(--r);font-size:12px;margin-bottom:14px;border:1px solid var(--border)}
.ioi-est-lbl{color:var(--text-3);font-family:var(--sans)}
.ioi-est-val{font-family:var(--mono);font-weight:500;color:var(--green)}
.ioi-toggles{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.toggle-row{display:flex;align-items:flex-start;gap:10px}
.ioi-cta{width:100%;padding:14px;background:var(--gold);border-radius:2px;font-size:13px;font-weight:600;letter-spacing:.02em;transition:all .22s var(--ease);position:relative;overflow:hidden;font-family:var(--sans);color:#0A0908}
.ioi-cta:hover:not(:disabled){background:var(--gold-b);transform:translateY(-1px);box-shadow:0 8px 24px rgba(197,165,114,.25)}
.ioi-cta:disabled{opacity:.4;cursor:not-allowed}

/* IOI submitted state */
.ioi-submitted{padding:24px 18px;text-align:center;animation:fadeUp .4s var(--ease)}
.ioi-check{width:44px;height:44px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-bd);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);margin:0 auto 14px}
.ioi-s-title{font-family:var(--serif);font-size:20px;font-style:italic;color:var(--text);margin-bottom:8px}
.ioi-s-body{font-size:13px;color:var(--text-2);line-height:1.7;font-family:var(--sans)}

/* IOI status pipeline */
.ioi-pipeline{margin-top:14px;padding:12px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r)}
.pipeline-title{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.pipeline-steps{display:flex;align-items:center;gap:0}
.ps-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.ps-step:not(:last-child)::after{content:'';position:absolute;left:50%;right:-50%;top:8px;height:1px;background:var(--border)}
.ps-step.done:not(:last-child)::after{background:var(--green-bd)}
.ps-step.active:not(:last-child)::after{background:linear-gradient(to right,var(--green-bd),var(--border))}
.ps-circle{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:7px;z-index:1;transition:all .3s}
.ps-step.done .ps-circle{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.ps-step.active .ps-circle{background:var(--amber);border-color:var(--amber);color:#0A0908;animation:pulse 1.5s infinite}
.ps-lbl{font-family:var(--mono);font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);text-align:center}
.ps-step.done .ps-lbl{color:var(--green)}.ps-step.active .ps-lbl{color:var(--amber)}

/* ══════════════════════════════════════════
   PORTFOLIO
══════════════════════════════════════════ */
.portfolio-hero{padding:clamp(32px,5vh,56px) clamp(24px,5vw,72px) 0;border-bottom:1px solid var(--border)}
.ph-greet{font-size:13px;color:var(--text-3);margin-bottom:5px;font-family:var(--sans)}
.ph-name{font-family:var(--serif);font-style:italic;font-size:clamp(28px,4vw,44px);color:var(--text);margin-bottom:20px}
.ph-stats{display:flex;gap:32px;padding-bottom:24px;flex-wrap:wrap}
.ph-stat-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text)}
.ph-stat-lbl{font-size:11px;color:var(--text-3);margin-top:3px;font-family:var(--sans)}
.portfolio-body{padding:clamp(24px,4vh,40px) clamp(24px,5vw,72px)}
.alloc-section{margin-bottom:30px;display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:640px){.alloc-section{grid-template-columns:auto 1fr}}
.alloc-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.alloc-ring{position:relative;width:100px;height:100px}
.alloc-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.alloc-legend{display:flex;flex-direction:column;justify-content:center;gap:8px}
.al-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);font-family:var(--sans)}
.al-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.al-amt{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.pos-grid{display:grid;gap:12px}
@media(min-width:640px){.pos-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1000px){.pos-grid{grid-template-columns:1fr 1fr 1fr}}
.pos-card{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden;transition:all .22s var(--ease);animation:fadeUp .5s var(--ease) both}
.pos-card:hover{border-color:var(--gold-bd);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.3)}
.pos-card-top{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.pos-class-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pos-name{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--text);margin-bottom:4px}
.pos-sub{font-size:12px;color:var(--text-3);font-family:var(--sans)}
.pos-pipeline{margin-top:10px}
.pos-card-btm{padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.pos-amount{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
.pos-badge{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid}
.ps-pending{color:var(--amber);border-color:var(--amber-bd);background:var(--amber-bg)}
.ps-approved{color:var(--green);border-color:var(--green-bd);background:var(--green-bg)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:11px 20px;font-size:13px;border-radius:3px;z-index:999;opacity:0;transition:all .25s var(--ease);pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.3);font-family:var(--sans)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green);color:#fff}.toast.err{background:var(--red);color:#fff}
.demo-badge{position:fixed;bottom:16px;right:16px;z-index:300;padding:5px 11px;background:var(--bg-3);border:1px solid var(--border);font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);border-radius:20px}

@media(max-width:640px){
  .hero-stats{gap:14px}
  .dd-grid{grid-template-columns:1fr}
  .action-sticky{position:static;top:auto}
  .stat-grid{grid-template-columns:1fr 1fr}
  .docs-grid{grid-template-columns:1fr 1fr}
}

/* ── MOBILE FIXES ── */
@media(max-width:600px){
  /* Prevent iOS input zoom */
  input,select,textarea{font-size:16px!important}
  /* IOI range slider — larger touch target */
  .ioi-slider{height:44px;cursor:pointer}
  /* NDA toggle — larger touch zone */
  .toggle-row{min-height:44px;align-items:center}
  /* Hero actions — stack buttons */
  .hero-actions{flex-direction:column;gap:10px}
  .btn-primary,.btn-ghost{width:100%;text-align:center;padding:14px 20px}
  /* Hero stats compact */
  .hero-stats{gap:0;flex-wrap:wrap}
  .hero-stat{padding:0 14px 0 0;margin-right:14px}
  /* Return chart — taller on mobile for readability */
  .return-chart{height:140px}
  /* Nav tabs scroll */
  .nav-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .ntab{flex-shrink:0;padding:0 14px;white-space:nowrap}
  /* Deal overlay — full width */
  .view-deal{width:100vw!important;right:0!important}
  /* Portfolio stat cards */
  .ph-stats{gap:16px}
  .ph-stat-val{font-size:20px}
}
@media(max-width:480px){
  /* Docs grid — 1 column on small phones */
  .docs-grid{grid-template-columns:1fr}
  /* Stats grid — 1 column */
  .stat-grid{grid-template-columns:1fr}
  /* Allocation ring — hide ring, show legend only */
  .alloc-ring-wrap{display:none}
  .alloc-section{grid-template-columns:1fr}
  /* IOI form padding */
  .ioi-form{padding:14px}
  /* Deal grid — always 1 col on very small */
  .deal-grid{grid-template-columns:1fr!important}
  /* Thesis max-width */
  .dd-thesis{max-width:100%;font-size:14px}
  /* Highlight cards */
  .hl-grid{grid-template-columns:1fr}
  /* Hero stat val smaller */
  .hero-stat-val{font-size:18px}
}
</style>
</head>

<!-- ══ VIEW: LOBBY ══ -->
<div id="view-lobby" class="view active">
  <div class="lobby-hero" id="hero-zone">
    <div class="hero-content">
      <div class="urgency-badge" id="hero-urgency" style="display:none"><span class="ub-dot"></span>Nearly Oversubscribed</div>
      <div class="hero-eyebrow"><span class="eyebrow-dot"></span><span id="hero-eyebrow-txt">Featured Opportunity</span></div>

        <button class="btn-ghost"   id="hero-cta-2">Express Interest</button>
      </div>
      <div class="social-proof" id="social-proof"></div>
    </div>

    <!-- PRISM VISUAL -->
    <div class="hero-visual">
      <div class="prism-svg-wrap">
        <svg class="prism-svg" viewBox="0 0 400 320" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="prismInner" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#C5A572" stop-opacity="0"/>
              <stop offset="45%" stop-color="#C5A572" stop-opacity="0.035"/>
              <stop offset="100%" stop-color="#5b85b8" stop-opacity="0"/>
            </linearGradient>
            <filter id="rayGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="1.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="vertexGlow" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Ambient background glow -->
          <ellipse cx="200" cy="240" rx="140" ry="55" fill="#C5A572" fill-opacity="0" style="animation:breatheGlow 5s ease-in-out infinite"/>

          <!-- Incoming light beam (white → enters prism apex) -->
          <line x1="40" y1="10" x2="200" y2="130" stroke="white" stroke-opacity="0.13" stroke-width="3" filter="url(#rayGlow)" style="animation:beamPulse 3.5s ease-in-out infinite"/>
          <line x1="55" y1="0"  x2="200" y2="130" stroke="white" stroke-opacity="0.07" stroke-width="1.8" style="animation:beamPulse 4s .4s ease-in-out infinite"/>
          <line x1="28" y1="20" x2="200" y2="130" stroke="white" stroke-opacity="0.05" stroke-width="1.2" style="animation:beamPulse 3s .8s ease-in-out infinite"/>

          <!-- Prism body with subtle fill -->
          <polygon points="200,30 348,264 52,264" fill="url(#prismInner)" stroke="currentColor" stroke-opacity=".09" stroke-width="1.3"/>

          <!-- Internal refraction geometry -->
          <line x1="200" y1="30"  x2="200" y2="264" stroke="currentColor" stroke-opacity=".04" stroke-width=".7"/>
          <line x1="200" y1="130" x2="348" y2="264" stroke="currentColor" stroke-opacity=".06" stroke-width=".8"/>
          <line x1="200" y1="130" x2="52"  y2="264" stroke="currentColor" stroke-opacity=".03" stroke-width=".6"/>

          <!-- FULL SPECTRUM OUTPUT (ROYGBIV) from base-right vertex -->
          <!-- Red -->
          <line x1="348" y1="264" x2="400" y2="162" stroke="#E05C4B" stroke-opacity=".8" stroke-width="2.4" filter="url(#rayGlow)" style="animation:raySpectrum 4.2s 0s ease-in-out infinite;transform-origin:348px 264px"/>
          <!-- Orange -->
          <line x1="348" y1="264" x2="400" y2="178" stroke="#D4742A" stroke-opacity=".72" stroke-width="2.1" style="animation:raySpectrum 4.5s .18s ease-in-out infinite;transform-origin:348px 264px"/>
          <!-- Yellow / Gold -->
          <line x1="348" y1="264" x2="400" y2="196" stroke="#C5A572" stroke-opacity=".82" stroke-width="2.4" filter="url(#rayGlow)" style="animation:raySpectrum 4.8s .35s ease-in-out infinite;transform-origin:348px 264px"/>
          <!-- Green -->
          <line x1="348" y1="264" x2="400" y2="214" stroke="#5a9e72" stroke-opacity=".72" stroke-width="2.1" style="animation:raySpectrum 5s .52s ease-in-out infinite;transform-origin:348px 264px"/>
          <!-- Cyan-Blue -->
          <line x1="348" y1="264" x2="400" y2="232" stroke="#5b85b8" stroke-opacity=".8" stroke-width="2.4" filter="url(#rayGlow)" style="animation:raySpectrum 4.6s .7s ease-in-out infinite;transform-origin:348px 264px"/>
          <!-- Indigo -->
          <line x1="348" y1="264" x2="400" y2="250" stroke="#4A5EA8" stroke-opacity=".6" stroke-width="1.8" style="animation:raySpectrum 4.3s .88s ease-in-out infinite;transform-origin:348px 264px"/>
          <!-- Violet -->
          <line x1="348" y1="264" x2="400" y2="268" stroke="#7B5EA8" stroke-opacity=".52" stroke-width="1.5" style="animation:raySpectrum 4s 1.05s ease-in-out infinite;transform-origin:348px 264px"/>

          <!-- Scattered particles at spectrum vertex -->
          <circle cx="360" cy="260" r="2" fill="#E05C4B" fill-opacity=".7" style="animation:particleDrift 2.8s 0s ease-out infinite"/>
          <circle cx="366" cy="268" r="1.4" fill="#C5A572" fill-opacity=".65" style="animation:particleDrift 3.2s .6s ease-out infinite"/>
          <circle cx="354" cy="272" r="1.6" fill="#5b85b8" fill-opacity=".6"  style="animation:particleDrift 2.5s 1.1s ease-out infinite"/>
          <circle cx="372" cy="255" r="1.2" fill="#5a9e72" fill-opacity=".55" style="animation:particleDrift 3.6s .3s ease-out infinite"/>
          <circle cx="358" cy="278" r="1"   fill="#7B5EA8" fill-opacity=".5"  style="animation:particleDrift 2.9s .9s ease-out infinite"/>

          <!-- Left exit (reflected beam) -->
          <line x1="52" y1="264" x2="0" y2="180" stroke="#5b85b8" stroke-opacity=".45" stroke-width="1.8" style="animation:raySpectrum 5.2s .5s ease-in-out infinite;transform-origin:52px 264px"/>
          <line x1="52" y1="264" x2="0" y2="200" stroke="#5b85b8" stroke-opacity=".25" stroke-width="1.1" style="animation:raySpectrum 4.8s .9s ease-in-out infinite;transform-origin:52px 264px"/>

          <!-- Vertex glow dots -->
          <circle cx="200" cy="30"  r="4.5" fill="#C5A572" fill-opacity=".5" filter="url(#vertexGlow)" style="animation:vertexGlow 3s ease-in-out infinite"/>
          <circle cx="348" cy="264" r="6"   fill="#C5A572" fill-opacity=".55" filter="url(#vertexGlow)" style="animation:vertexGlow 2.5s .5s ease-in-out infinite"/>
          <circle cx="52"  cy="264" r="4.5" fill="#5b85b8" fill-opacity=".45" filter="url(#vertexGlow)" style="animation:vertexGlow 3.5s 1s ease-in-out infinite"/>
        </svg>
      </div>

      <!-- Subscription ring floating over prism -->

        <div class="rc-wrap"><div class="rc-val" id="rc-uv">—</div><div class="rc-bar rc-up"   id="rc-u" style="height:0"></div><div class="rc-lbl">Upside</div></div>
      </div>
      <div class="hurdle-line"><div class="hurdle-dash"></div><div class="hurdle-lbl">Hurdle: ${d.hurdle}%</div></div>
    </div>
    ${tlHtml}
    <div class="docs-section">
      <div class="chart-lbl" style="margin-bottom:12px">Deal Documents</div>
      <div class="docs-grid">${docsHtml}</div>
    </div>`;

  // Right panel
  document.getElementById('dd-right').innerHTML = `
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-lbl">Target IRR</div><div class="stat-val gold">${d.target_irr}%</div></div>
      <div class="stat-cell"><div class="stat-lbl">Term</div><div class="stat-val">${d.term}mo</div></div>
      <div class="stat-cell"><div class="stat-lbl">Min Ticket</div><div class="stat-val">${fmU(d.min_ticket)}</div></div>
      <div class="stat-cell"><div class="stat-lbl">Allocation</div><div class="stat-val">${fmU(d.target_alloc)}</div></div>
      <div class="stat-cell"><div class="stat-lbl">Hurdle Rate</div><div class="stat-val">${d.hurdle}%</div></div>
      <div class="stat-cell"><div class="stat-lbl">Closing</div><div class="stat-val ${days < 30 ? 'red' : days < 60 ? 'gold' : ''}">${days}d</div></div>
    </div>
    <div class="panel-ring-row">
      <div class="ring-wrap" style="width:78px;height:78px">
        <svg width="78" height="78" viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" id="panel-ring" cx="55" cy="55" r="46" style="stroke-dasharray:289;stroke-dashoffset:289"/>
        </svg>
        <div class="ring-label"><div class="ring-pct" id="panel-ring-pct" style="font-size:13px">—</div></div>
      </div>
      <div class="panel-ring-info">
        <div class="pri-title" id="pri-title">—</div>
        <div class="pri-detail" id="pri-detail"></div>
      </div>
    </div>
    <div class="ioi-form" id="ioi-form">
      <div class="ioi-head">Express Interest</div>
      <div class="ioi-body" id="ioi-body">
        ${!signed ? `
        <div class="nda-gate">
          <div class="nda-gate-title">NDA Required</div>
          <div class="nda-gate-body">To access full deal documents and submit an expression of interest, please confirm your agreement to the Non-Disclosure Agreement for this transaction.</div>
          <div class="nda-toggle-row">
            <label class="toggle-sw"><input type="checkbox" id="nda-toggle" onchange="signNda('${d.id}')"><div class="tog-track"></div><div class="tog-thumb"></div></label>
            <span class="tog-text">I agree to the NDA terms for <strong>${d.name}</strong> and confirm I am a qualified investor.</span>
          </div>
        </div>` : ''}
        <div id="ioi-form-inner" style="${!signed ? 'opacity:.35;pointer-events:none' : ''}">
          <label class="ioi-lbl">Indication Amount (USD)</label>
          <input type="number" class="ioi-input" id="ioi-input" value="${d.min_ticket}" min="${d.min_ticket}" step="${d.min_ticket >= 250000 ? 250000 : 50000}">
          <input type="range" class="ioi-slider" id="ioi-slider" min="${d.min_ticket}" max="${Math.min(d.target_alloc, 10000000)}" step="${d.min_ticket >= 250000 ? 250000 : 50000}" value="${d.min_ticket}">
          <div class="slider-marks">
            <span class="sm">${fmU(d.min_ticket)}</span>
            <span class="sm">${fmU(Math.min(d.target_alloc, 10000000) / 2)}</span>
            <span class="sm">${fmU(Math.min(d.target_alloc, 10000000))}</span>
          </div>
          <div class="ioi-est">
            <span class="ioi-est-lbl">Est. annual return at base case</span>
            <span class="ioi-est-val" id="ioi-est">—</span>
          </div>
          <div class="ioi-toggles">
            <div class="toggle-row"><label class="toggle-sw"><input type="checkbox" id="ack1" onchange="checkAcks()"><div class="tog-track"></div><div class="tog-thumb"></div></label><span class="tog-text">I am a qualified / accredited investor and understand this is a private placement not registered under any securities act.</span></div>
            <div class="toggle-row"><label class="toggle-sw"><input type="checkbox" id="ack2" onchange="checkAcks()"><div class="tog-track"></div><div class="tog-thumb"></div></label><span class="tog-text">This expression of interest is non-binding. No capital is committed or transferred at this stage.</span></div>
            <div class="toggle-row"><label class="toggle-sw"><input type="checkbox" id="ack3" onchange="checkAcks()"><div class="tog-track"></div><div class="tog-thumb"></div></label><span class="tog-text">I consent to the Aurum Prism team contacting me to progress this indication.</span></div>
          </div>
          <button class="ioi-cta" id="ioi-cta" disabled onclick="submitIoi()">Confirm Expression of Interest →</button>
        </div>
      </div>
    </div>`;

  // Animate ring
  setTimeout(() => {
    document.getElementById('panel-ring-pct').textContent = pct + '%';
    document.getElementById('pri-title').textContent = overSub ? 'Oversubscribed' : `${pct}% Subscribed`;
    document.getElementById('pri-detail').innerHTML = `<em>${fmU(d.ioi_agg)}</em> of ${fmU(d.target_alloc)}<br>from <em>${d.ioi_count} investors</em>`;
    const r = document.getElementById('panel-ring');
    r.style.stroke = overSub ? 'var(--green)' : pct >= 80 ? 'var(--amber)' : 'var(--gold)';
    r.style.strokeDashoffset = 289 * (1 - pct / 100);
    r.style.transition = 'stroke-dashoffset 1.5s var(--ease)';
  }, 350);

  // Return chart
  const amt  = 500000;
  const vals = [
    Math.round(amt * Math.max(d.target_irr - 5, 1) / 100),
    Math.round(amt * d.target_irr / 100),
    Math.round(amt * (d.target_irr + 4) / 100),
  ];
  const maxV = Math.max(...vals);
  document.getElementById('rc-dv').textContent = '$' + (vals[0] / 1000).toFixed(0) + 'K/yr';
  document.getElementById('rc-bv').textContent = '$' + (vals[1] / 1000).toFixed(0) + 'K/yr';
  document.getElementById('rc-uv').textContent = '$' + (vals[2] / 1000).toFixed(0) + 'K/yr';
  setTimeout(() => {
    [['rc-d', vals[0]], ['rc-b', vals[1]], ['rc-u', vals[2]]].forEach(([id, v]) => {
      const el = document.getElementById(id);
      el.style.transition = 'height 1.1s var(--ease)';
      el.style.height = Math.round(v / maxV * 100) + 'px';
    });
  }, 300);

  // Slider sync
  function syncSlider() {
    const v = parseInt(document.getElementById('ioi-input').value) || 0;
    document.getElementById('ioi-slider').value = v;
    document.getElementById('ioi-est').textContent = fmFull(Math.round(v * d.target_irr / 100)) + ' / yr';
  }
  const inp = document.getElementById('ioi-input');
  const sld = document.getElementById('ioi-slider');
  if(inp) inp.addEventListener('input', syncSlider);
  if(sld) sld.addEventListener('input', function() { document.getElementById('ioi-input').value = this.value; syncSlider(); });
  syncSlider();

  document.getElementById('view-deal').classList.add('open');
  document.getElementById('view-deal').scrollTop = 0;
  if(action === 'ioi') setTimeout(() => document.getElementById('ioi-form')?.scrollIntoView({ behavior: 'smooth' }), 450);
}

function signNda(dealId) {
  const checked = document.getElementById('nda-toggle').checked;
  ndaSigned[dealId] = checked;
  const inner = document.getElementById('ioi-form-inner');
  if(inner) {
    inner.style.opacity = checked ? '1' : '.35';
    inner.style.pointerEvents = checked ? '' : 'none';
  }
  if(checked) {
    toast('NDA agreed — documents unlocked', 'ok');
    // Refresh doc cards
    setTimeout(() => openDeal(dealId), 300);
  }
}

function checkAcks() {
  const all = ['ack1','ack2','ack3'].every(id => { const el = document.getElementById(id); return el && el.checked; });
  const cta = document.getElementById('ioi-cta');
  if(cta) cta.disabled = !all;
}

async function submitIoi() {
  const d   = DEALS.find(x => x.id === activeDeal);
  const amt = parseInt(document.getElementById('ioi-input')?.value) || 0;
  if(!d || amt < d.min_ticket) { toast(`Minimum indication: ${fmU(d?.min_ticket || 0)}`, 'err'); return; }
  const cta = document.getElementById('ioi-cta');
  if(cta){cta.disabled=true;cta.textContent='Submitting…';}
  const r = await api('POST','/api/marketplace/ioi',{deal_id:d.id,amount:amt,notes:''});
  if(cta){cta.disabled=false;cta.textContent='Confirm Expression of Interest →';}
  if(r && !r.ok && r.error){ toast(r.error,'err'); return; }
  const ex = PORTFOLIO.find(p => p.deal_id === activeDeal);
  if(!ex) PORTFOLIO.push({ deal_id: activeDeal, amount: amt, status: 'pending', submitted: 'Today', pipeline_step: 1 });
  d.ioi_count++; d.ioi_agg += amt;
  const head = document.querySelector('.ioi-head');
  const body = document.getElementById('ioi-body');
  if(head) head.textContent = 'Expression Received';
  if(body) {
    body.style.display = 'none';
    const sub = document.createElement('div');
    sub.className = 'ioi-submitted';
    sub.innerHTML = `<div class="ioi-check">✓</div>
      <div class="ioi-s-title">Interest Recorded</div>
      <div class="ioi-s-body">Your indication of <strong>${fmFull(amt)}</strong> in <em>${d.name}</em> has been received. Our team will review and be in touch within 2 business days.</div>
      <div class="ioi-pipeline" style="margin-top:14px">
        <div class="pipeline-title">IOI Status Pipeline</div>
        <div class="pipeline-steps">${PIPELINE_STEPS.map((s, i) => `
          <div class="ps-step ${i === 0 ? 'done' : i === 1 ? 'active' : ''}">
            <div class="ps-circle">${i === 0 ? '✓' : i + 1}</div>
            <div class="ps-lbl">${s}</div>
          </div>`).join('')}</div>
      </div>
      <div style="margin-top:12px">
        <button onclick="showView('portfolio',document.querySelectorAll('.ntab')[1])" style="width:100%;padding:12px;border:1px solid var(--border-m);border-radius:2px;font-size:13px;font-weight:500;color:var(--text-2);transition:all .15s;font-family:var(--sans);background:transparent;cursor:pointer" onmouseover="this.style.borderColor='var(--gold-bd)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border-m)';this.style.color='var(--text-2)'">View My Portfolio →</button>
      </div>`;
    document.getElementById('ioi-form').appendChild(sub);
  }
  toast('Expression of interest submitted', 'ok');
}

function closeDeal() {
  document.getElementById('view-deal').classList.remove('open');
  activeDeal = null;
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDeal(); });

/* ── PORTFOLIO ── */
function renderPortfolio() {
  const total    = PORTFOLIO.reduce((s, p) => s + p.amount, 0);
  const approved = PORTFOLIO.filter(p => p.status === 'approved').reduce((s, p) => s + p.amount, 0);
  document.getElementById('p-total').textContent    = fmU(total);
  document.getElementById('p-approved').textContent = fmU(approved);
  document.getElementById('p-count').textContent    = PORTFOLIO.length;

  const segs  = PORTFOLIO.map(p => { const d = DEALS.find(x => x.id === p.deal_id); return { name: d.name, ac: d.asset_class, amount: p.amount }; });
  const totA  = segs.reduce((s, x) => s + x.amount, 0);
  let offset  = 0; const circ = 251;
  const paths = segs.map(seg => {
    const frac = seg.amount / totA; const dash = frac * circ;
    const path = `<circle cx="45" cy="45" r="40" fill="none" stroke="${CLASS_COLOR[seg.ac]}" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-offset}" style="transform:rotate(-90deg);transform-origin:45px 45px"/>`;
    offset += dash; return path;
  });
  document.getElementById('alloc-section').innerHTML = `
    <div class="alloc-ring-wrap">
      <div class="alloc-ring"><svg viewBox="0 0 90 90" width="100" height="100">
        <circle cx="45" cy="45" r="40" fill="none" stroke="var(--border)" stroke-width="10"/>
        ${paths.join('')}
      </svg></div>
      <div style="font-size:11px;color:var(--text-3);font-family:var(--sans)">By Asset Class</div>
    </div>
    <div class="alloc-legend">${segs.map(seg => `
      <div class="al-row">
        <div class="al-dot" style="background:${CLASS_COLOR[seg.ac]}"></div>
        <div style="font-family:var(--serif);font-style:italic;font-size:13px">${seg.name}</div>
        <div class="al-amt">${fmFull(seg.amount)}</div>
      </div>`).join('')}
    </div>`;

  document.getElementById('portfolio-list').innerHTML = PORTFOLIO.map((p, i) => {
    const d = DEALS.find(x => x.id === p.deal_id); if(!d) return '';
    const isApp = p.status === 'approved';
    const step  = p.pipeline_step || 1;
    return `<div class="pos-card" style="animation-delay:${i * 80}ms">
      <div class="pos-card-top">
        <div class="pos-class-row">
          <div style="width:24px;height:24px;border-radius:3px;background:${d.logo_bg};border:1px solid ${d.logo_bd};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:${d.logo_color}">${d.ticker}</div>
          <span class="dc-class-tag ${CLASS_TAG[d.asset_class]}">${CLASS_LABEL[d.asset_class]}</span>
        </div>
        <div class="pos-name">${d.name}</div>
        <div class="pos-sub">${d.geography} · ${d.target_irr}% IRR · Submitted ${p.submitted}</div>
        <div style="margin-top:8px;font-size:11px;color:${isApp ? 'var(--green)' : 'var(--text-3)'}">
          ${isApp ? '🔓 Data room access granted' : '🔒 Data room pending approval'}
        </div>
        <div class="ioi-pipeline pos-pipeline" style="margin-top:10px">
          <div class="pipeline-steps">${PIPELINE_STEPS.map((s, j) => `
            <div class="ps-step ${j < step ? 'done' : j === step ? 'active' : ''}">
              <div class="ps-circle">${j < step ? '✓' : j + 1}</div>
              <div class="ps-lbl">${s}</div>
            </div>`).join('')}</div>
        </div>
      </div>
      <div class="pos-card-btm">
        <div class="pos-amount">${fmFull(p.amount)}</div>
        <span class="pos-badge ${isApp ? 'ps-approved' : 'ps-pending'}">${p.status.toUpperCase()}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── INIT ── */
function toggleTheme(){
  const h=document.documentElement,dark=h.dataset.theme==='dark';
  h.dataset.theme=dark?'light':'dark';
  document.getElementById('theme-btn').textContent=dark?'☾':'☀';
}
async function logout(){
  await fetch('/api/inst/logout',{method:'POST',credentials:'include'});
  window.location.href='/login';
}

async function load(){
  initLobby(); // render mock data immediately
  const me=await fetchSilent('/api/me');
  if(!me||me._unauth)return;
  if(me.ok){
    // Update nav with real investor info
    if(me.firm){
      const el=document.getElementById('nav-user-name');
      const av=document.getElementById('nav-avatar');
      if(el)el.textContent=me.firm;
      if(av)av.textContent=me.firm.slice(0,2).toUpperCase();
    }
    const [dealsR,ioisR]=await Promise.all([
      fetchSilent('/api/deals/marketplace'),
      fetchSilent('/api/marketplace/my-iois')
    ]);
    let updated=false;
    if(dealsR?.deals&&dealsR.deals.length){DEALS=dealsR.deals.map((d,i)=>adaptDeal(d,i));updated=true;}
    if(ioisR?.iois&&ioisR.iois.length){PORTFOLIO=ioisR.iois.map(i=>({deal_id:i.deal_id,amount:i.amount,status:i.status,submitted:new Date(i.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}),pipeline_step:i.status==='approved'?3:i.status==='rejected'?2:1}));updated=true;}
    if(updated)initLobby();
  }
}
load();
</script>
</body>
</html>
