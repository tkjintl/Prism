async function submitIoi() {
  const d   = DEALS.find(x => x.id === activeDeal);
  const amt = readAmt(document.getElementById('ioi-input'));
  if(!d || amt < 100000) { toast('Minimum indication: $100K', 'err'); return; }
  const cta = document.getElementById('ioi-cta');
  if(cta){cta.disabled=true;cta.textContent='Submitting…';}
  const r = await api('POST','/api/v2?resource=marketplace&op=ioi',{deal_id:d.id,amount:amt,notes:''});
  if(cta){cta.disabled=false;cta.textContent='Confirm Expression of Interest →';}
  // Hard-stop only on "already submitted" — other API errors (like deal not published yet) let the mock flow proceed
  if(r && !r.ok && r.error && r.error.toLowerCase().includes('already submitted')) {
    toast(r.error,'err'); return;
  }
  const ex = PORTFOLIO.find(p => p.deal_id === activeDeal);
  if(!ex) PORTFOLIO.push({ deal_id: activeDeal, amount: amt, status: 'pending', submitted: 'Today', pipeline_step: 1 });
  d.ioi_count++; d.ioi_agg += amt;
  showIoiConfirmation(d, amt);
  toast('Expression of interest submitted', 'ok');
}

async function viewInvestorDoc(dealId, slot) {
  const res = await fetchSilent(`/api/v2?resource=inst&op=inst-doc-download&dealId=${dealId}&slot=${slot}`);
  if (!res?.data) { toast('Document not available', 'err'); return; }
  const doc = res;
  const b64 = doc.data;
  if (!b64) { toast('Document not available', 'err'); return; }
  try {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const blob = new Blob([arr], { type: doc.type || 'application/pdf' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  } catch { toast('Error opening document', 'err'); }
}

/* ── INVESTOR DATAROOM RENDER ── */
function renderInvestorDataroom() {
  const d = DEALS.find(x => x.id === activeDeal);
  const panel = document.getElementById('inv-tab-dataroom');
  if(!d || !panel) return;

  // DD deadline banner
  let bannerHtml = '';
  if(d.closing) {
    const ddDeadline = new Date(new Date(d.closing) - 14*24*60*60*1000);
    const now = new Date();
    const daysLeft = Math.round((ddDeadline - now) / 86400000);
    const deadlineStr = ddDeadline.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    if(daysLeft > 0) {
      bannerHtml = `<div class="dd-deadline-banner active">&#9679; DD Period open &middot; Closes ${deadlineStr} &middot; ${daysLeft} day${daysLeft!==1?'s':''} remaining</div>`;
    } else {
      bannerHtml = `<div class="dd-deadline-banner expired">&#9632; DD Period closed &middot; ${deadlineStr}</div>`;
    }
  }
  const ddClosed = bannerHtml.includes('expired');

  // File list grouped by folder
  const files = d.vdr_files || [];
  const filesByFolder = {};
  files.forEach(f => {
    const fld = f.folder || 'General';
    if(!filesByFolder[fld]) filesByFolder[fld] = [];
    filesByFolder[fld].push(f);
  });
  let filesHtml = '';
  if(files.length === 0) {
    filesHtml = `<div class="inv-dr-empty">No files have been added to the data room yet.</div>`;
  } else {
    Object.entries(filesByFolder).forEach(([folder, fls]) => {
      filesHtml += `<div class="inv-dr-folder-label">${folder}</div>`;
      fls.forEach(f => {
        filesHtml += `<div class="inv-dr-file-row">
          <span style="font-size:14px">📄</span>
          <span class="inv-dr-file-name">${f.name}</span>
          <span class="inv-dr-file-size">${f.sizeStr||'—'}</span>
          <span class="inv-dr-file-date">${f.uploadedAt||''}</span>
          <button class="inv-dr-view-btn" onclick="viewVdrFileInvestor('${d.id}','${f.id}','${f.name}')">View</button>
        </div>`;
      });
    });
  }

  // Q&A chat
  const qaItems = d._investorQa || [];
  let chatHtml = '';
  if(qaItems.length === 0){
    chatHtml = `<div style="padding:40px 20px;text-align:center;color:var(--text-3);font-size:13px;line-height:1.7">No messages yet. Your advisor will send an opening statement shortly.<br>You can submit questions below.</div>`;
  } else {
    qaItems.forEach(q => {
      if(q.type === 'advisor_open'){
        // Advisor broadcast — show on left (advisor side)
        chatHtml += `<div class="inv-qa-bubble advisor">
          <div class="inv-qa-bubble-body">${q.message}</div>
          <div class="inv-qa-bubble-meta">${q.sentBy || 'Advisor'} &middot; ${q.sentAt || ''}</div>
        </div>`;
      } else {
        // Investor question — show on right
        chatHtml += `<div class="inv-qa-bubble investor">
          <div class="inv-qa-bubble-body">${q.question}</div>
          <div class="inv-qa-bubble-meta">You &middot; ${q.askedAt || ''}
            ${!q.answer ? `<span class="inv-qa-pending">Awaiting reply</span>` : ''}
          </div>
        </div>`;
        if(q.answer){
          chatHtml += `<div class="inv-qa-bubble advisor">
            <div class="inv-qa-bubble-body">${q.answer}</div>
            <div class="inv-qa-bubble-meta">${q.answeredBy || 'Advisor'} &middot; ${q.answeredAt || ''}</div>
          </div>`;
        }
      }
    });
  }

  const composeBlock = ddClosed
    ? `<div style="padding:12px 14px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--text-3)">DD period has closed — Q&amp;A submissions are no longer accepted.</div>`
    : `<div class="inv-qa-compose">
        <textarea class="inv-qa-input" id="inv-qa-input" placeholder="Submit a question to your advisor…"></textarea>
        <button class="inv-qa-send-btn" id="inv-qa-send-btn" onclick="submitInvestorQuestion('${d.id}')">SEND</button>
      </div>`;

  panel.innerHTML = `${bannerHtml}
    <div class="chart-lbl" style="margin-bottom:12px">Virtual Data Room</div>
    <div class="inv-dr-section">${filesHtml}</div>
    <div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:20px">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3)">Investor Q&amp;A</div>
      <div class="inv-qa-chat" id="inv-qa-chat">${chatHtml}</div>
      ${composeBlock}
    </div>`;

  // Load real VDR files and QA thread from API (requires approved IOI)
  loadVdrFilesInvestor(d.id);
  loadQaThread(d.id);
}

async function loadVdrFilesInvestor(dealId) {
  const res = await fetchSilent(`/api/v2?resource=inst&op=vdr-files&dealId=${dealId}`);
  if(!res || !res.files) return;
  const d = DEALS.find(x => x.id === dealId);
  if(!d) return;
  d.vdr_files = res.files;
  // Re-render the dataroom panel if it is currently visible
  const panel = document.getElementById('inv-tab-dataroom');
  if(panel && panel.style.display !== 'none') renderInvestorDataroom();
}

async function loadQaThread(dealId) {
  const res = await fetchSilent(`/api/v2?resource=inst&op=qa-thread&dealId=${dealId}`);
  if(!res || !res.qa) return;
  const d = DEALS.find(x => x.id === dealId);
  if(!d) return;
  // Map API items directly — supports both investor_q and advisor_open types
  d._investorQa = res.qa.map(item => ({...item}));
  // Re-render only the QA portion if panel is visible
  const panel = document.getElementById('inv-tab-dataroom');
  if(panel && panel.style.display !== 'none') renderInvestorDataroom();
}

async function submitInvestorQuestion(dealId) {
  const inp = document.getElementById('inv-qa-input');
  const btn = document.getElementById('inv-qa-send-btn');
  if(!inp) return;
  const text = inp.value.trim();
  if(!text) { toast('Please enter a question','err'); return; }
  if(btn){btn.disabled=true;btn.textContent='...';}

  await api('POST','/api/v2?resource=inst&op=submit-qa',{dealId, question:text});

  // Append locally as a right-side bubble immediately
  const d = DEALS.find(x => x.id === dealId);
  if(d) {
    if(!d._investorQa) d._investorQa = [];
    d._investorQa.push({
      id: 'q'+Date.now(),
      type: 'investor_q',
      question: text,
      askedBy: 'You',
      askedAt: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      answer: null,
    });
  }
  inp.value = '';
  if(btn){btn.disabled=false;btn.textContent='SEND';}
  toast('Question submitted','ok');
  renderInvestorDataroom();
  // Scroll chat to bottom so the new bubble is visible
  const chat = document.getElementById('inv-qa-chat');
  if(chat) chat.scrollTop = chat.scrollHeight;
}

function renderPortfolio() {
  const total    = PORTFOLIO.reduce((s, p) => s + p.amount, 0);

  document.getElementById('p-total').textContent    = fmU(total);
  document.getElementById('p-approved').textContent = fmU(approved);

  const totA  = segs.reduce((s, x) => s + x.amount, 0);
  let offset  = 0; const circ = 251;
  const paths = segs.map(seg => {
    const frac = seg.amount / totA; const dash = frac * circ;
    const path = `<circle cx="45" cy="45" r="40" fill="none" stroke="${CLASS_COLOR[seg.ac]}" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-offset}" style="transform:rotate(-90deg);transform-origin:45px 45px"/>`;

  document.getElementById('alloc-section').innerHTML = `
    <div class="alloc-ring-wrap">
      <div class="alloc-ring"><svg viewBox="0 0 90 90" width="100" height="100">

      <div class="pos-card-top">

function toggleTheme(){
  const h=document.documentElement,dark=h.dataset.theme==='dark';
  h.dataset.theme=dark?'light':'dark';
  document.getElementById('theme-btn').textContent=dark?'☾':'☀';
}
async function logout(){
  await fetch('/api/inst/logout',{method:'POST',credentials:'include'});
  window.location.href='/login';
}

async function load(){
  initLobby(); // render mock data immediately
  const me=await fetchSilent('/api/me');
  if(!me||me._unauth)return;
  if(me.ok){
    // Update nav with real investor info
    var _invHour=new Date().getHours();
    var _invGreet=_invHour<12?'Good morning':_invHour<17?'Good afternoon':'Good evening';
    var _greetEl=document.getElementById('hero-greeting');
    if(_greetEl){
      var _greetName=me.name||me.firm||'';
      var _greetWords=_invGreet.split(' ');
      var _greetHTML=_greetWords.map(function(w,i){return '<span class="greet-word" style="animation-delay:'+(i*0.12)+'s">'+w+'</span>';}).join('&nbsp;');
      if(_greetName)_greetHTML+='<span class="greet-word" style="animation-delay:'+(_greetWords.length*0.12)+'s">,&nbsp;</span><span class="greet-name">'+_greetName+'</span>';
      _greetEl.innerHTML=_greetHTML;
    }
    if(me.name||me.firm){
      const el=document.getElementById('nav-user-name');
      const av=document.getElementById('nav-avatar');
      const _navName=me.name||me.firm;
      if(el)el.textContent=_navName;
      if(av)av.textContent=_navName.slice(0,2).toUpperCase();
    }
    const [dealsR,ioisR]=await Promise.all([
      fetchSilent('/api/v2?resource=deals&op=marketplace'),
      fetchSilent('/api/v2?resource=marketplace&op=my-iois')
    ]);
    // Replace with live API data when available; mock data stays as fallback
    var _invDeals=dealsR&&dealsR.deals?dealsR.deals.length:0;var _invIois=ioisR&&ioisR.iois?ioisR.iois.length:0;var _invAmt=ioisR&&ioisR.iois?ioisR.iois.reduce(function(s,x){return s+(x.amount||0);},0):0;var _invPct=_invDeals>0?Math.round(_invIois/_invDeals*100):0;(function(){var rp=document.getElementById("inv-ring-pct");if(rp)rp.textContent=_invPct+"%";var ri=document.getElementById("inv-ring-ioi");if(ri)ri.textContent=_invAmt>0?("$"+(_invAmt>=1e6?(_invAmt/1e6).toFixed(1)+"M":_invAmt.toLocaleString())):"—";var rd=document.getElementById("inv-ring-deals");if(rd)rd.textContent=_invDeals+" open opportunit"+(_invDeals===1?"y":"ies");var rs=document.getElementById("inv-ring-status");if(rs)rs.textContent=_invIois+" indication"+(_invIois===1?"":"s")+" submitted";setTimeout(function(){var r=document.getElementById("inv-ring-fill");if(r)r.style.strokeDashoffset=String(Math.round(295*(1-_invPct/100)));},300);})();
    var _ringRow=document.getElementById("inv-ring-row");if(_ringRow)_ringRow.style.display=_invDeals>0?"flex":"none";
    if(dealsR?.deals&&dealsR.deals.length){DEALS=dealsR.deals.map((d,i)=>adaptDeal(d,i));}
    if(ioisR?.iois&&ioisR.iois.length){PORTFOLIO=ioisR.iois.map(i=>({deal_id:i.deal_id,amount:i.amount,status:i.status,submitted:new Date(i.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}),pipeline_step:i.status==='approved'?3:i.status==='rejected'?2:1}));}
    initLobby();
  }
}
load();
</script>
