<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aurum Prism · Private Opportunities</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0908;--bg-2:#0F0E0C;--bg-3:#161412;--surface:#131210;
  --border:rgba(255,255,255,0.06);--border-m:rgba(255,255,255,0.11);
  --text:#EDE8DF;--text-2:#A09A91;--text-3:#6B665E;
  --gold:#C5A572;--gold-b:#E3C187;--gold-bg:rgba(197,165,114,0.07);--gold-bd:rgba(197,165,114,0.22);
  --green:#5a9e72;--green-bg:rgba(90,158,114,0.07);--green-bd:rgba(90,158,114,0.25);
  --amber:#b8833a;--amber-bg:rgba(184,131,58,0.08);--amber-bd:rgba(184,131,58,0.28);
  --red:#b05e56;--red-bg:rgba(176,94,86,0.07);--red-bd:rgba(176,94,86,0.22);
  --blue:#5b85b8;--blue-bg:rgba(91,133,184,0.07);--blue-bd:rgba(91,133,184,0.25);
  --slate:#7B8FA1;--slate-bg:rgba(123,143,161,0.07);--slate-bd:rgba(123,143,161,0.22);
  --purple:#8B72BE;--purple-bg:rgba(139,114,190,0.07);--purple-bd:rgba(139,114,190,0.22);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:6px;--nav-h:56px;--ease:cubic-bezier(0.22,1,0.36,1);
}
[data-theme="light"]{
  --bg:#F7F5F1;--bg-2:#FFFFFF;--bg-3:#EFECE6;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.07);--border-m:rgba(0,0,0,0.12);
  --text:#18160F;--text-2:#5A5449;--text-3:#9C968A;
  --gold:#A8813A;--gold-b:#C5A572;--gold-bg:rgba(168,129,58,0.07);--gold-bd:rgba(168,129,58,0.25);
  --green:#2E6E48;--green-bg:rgba(46,110,72,0.07);--green-bd:rgba(46,110,72,0.25);
  --amber:#8A5C1A;--amber-bg:rgba(138,92,26,0.08);--amber-bd:rgba(138,92,26,0.28);
  --red:#8B3228;--red-bg:rgba(139,50,40,0.07);--red-bd:rgba(139,50,40,0.22);
  --blue:#2B5C8A;--blue-bg:rgba(43,92,138,0.07);--blue-bd:rgba(43,92,138,0.25);
  --slate:#4A5E6E;--slate-bg:rgba(74,94,110,0.07);--slate-bd:rgba(74,94,110,0.22);
  --purple:#5B3E8A;--purple-bg:rgba(91,62,138,0.07);--purple-bd:rgba(91,62,138,0.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scroll-behavior:smooth}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit;background:var(--surface);border:1px solid var(--border-m);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border-m);border-radius:2px}

/* ── ANIMATIONS ── */
@keyframes fadeUp    {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes pulse     {0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer   {from{opacity:.5}to{opacity:1}}
@keyframes cardReveal{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
/* Prism-specific */
@keyframes beamPulse {0%,100%{opacity:.55}50%{opacity:.22}}
@keyframes raySpectrum{0%,100%{opacity:1;transform:scaleX(1)}50%{opacity:.55;transform:scaleX(.97)}}
@keyframes vertexGlow{0%,100%{r:5px;opacity:.85}50%{r:3.5px;opacity:.4}}
@keyframes particleDrift{0%{transform:translate(0,0);opacity:.9}100%{transform:translate(14px,-12px);opacity:0}}
@keyframes breatheGlow{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.32;transform:scale(1.08)}}
@keyframes prismRotate{0%,100%{filter:drop-shadow(0 0 32px rgba(197,165,114,.18))}50%{filter:drop-shadow(0 0 56px rgba(197,165,114,.32))}}
@keyframes barGrow   {from{width:0}to{width:var(--bar-w)}}
@keyframes lockOpen  {0%{transform:rotate(0deg)}50%{transform:rotate(15deg)}100%{transform:rotate(0deg)}}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:none}}
@keyframes stepPop   {0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
/* Hero entrance */
@keyframes prismEnter{from{opacity:0;transform:scale(.88) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes wordSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes ambientPulse{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:.14;transform:scale(1.12)}}
@keyframes gridFadeIn{from{opacity:0}to{opacity:1}}
@keyframes statReveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;display:flex;align-items:center;padding:0 24px;gap:16px;background:rgba(10,9,8,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.nav-wordmark{display:flex;flex-direction:column;justify-content:center;gap:3px;flex-shrink:0}
.nav-wm-tacc{font-family:var(--mono);font-size:8px;letter-spacing:.18em;color:var(--text-3);text-transform:uppercase}
.nav-wm-name{display:flex;align-items:center;line-height:1}
.nav-wm-aurum{font-family:var(--mono);font-size:13px;letter-spacing:.22em;color:var(--text);text-transform:uppercase}
.nav-wm-rule{display:block;width:1px;height:12px;background:var(--gold-bd);margin:0 10px;flex-shrink:0}
.nav-wm-prism{font-family:var(--mono);font-size:13px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.nav-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.nav-tabs{display:flex}
.ntab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;font-family:var(--sans)}
.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ntab:hover:not(.on){color:var(--text-2)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-user-info{text-align:right}
.nav-user-name{font-size:12px;font-weight:500;color:var(--text);line-height:1}
.nav-user-type{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text-3);margin-top:1px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-bg);border:1px solid var(--gold-bd);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--gold);flex-shrink:0}
.theme-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-m);border-radius:50%;color:var(--text-2);font-size:16px;transition:all .2s;cursor:pointer;background:none;font-family:inherit}
.theme-btn:hover{border-color:var(--gold-bd);color:var(--gold)}

/* ── VIEWS ── */
.view{display:none;padding-top:var(--nav-h);min-height:100vh}
.view.active{display:block}

/* ══════════════════════════════════════════
   LOBBY
══════════════════════════════════════════ */
.lobby-hero{
  min-height:calc(100vh - var(--nav-h));display:grid;position:relative;overflow:hidden;
  background:#0A0908;
}
.lobby-hero::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 70% at 20% 50%,rgba(197,165,114,.08) 0%,transparent 62%),
    radial-gradient(ellipse 40% 50% at 78% 52%,rgba(197,165,114,.05) 0%,transparent 55%);
  animation:ambientPulse 4s ease-in-out infinite;
}
.lobby-hero::after{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(197,165,114,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(197,165,114,.018) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridFadeIn 1.2s .3s both;
}
@media(min-width:900px){.lobby-hero{grid-template-columns:55% 45%}}
.hero-content{padding:clamp(44px,9vh,88px) clamp(24px,5vw,72px);display:flex;flex-direction:column;justify-content:center;z-index:2;position:relative;animation:fadeUp .7s .05s var(--ease) both}
.lobby-greeting{
  position:absolute;top:clamp(18px,3vh,36px);left:clamp(24px,5vw,72px);
  font-family:var(--serif);font-style:italic;font-size:clamp(14px,1.3vw,18px);
  color:var(--text-2);z-index:10;letter-spacing:-.01em;pointer-events:none;
}
/* Greeting word animation spans */
.greet-word{display:inline-block;opacity:0;animation:wordSlideUp .55s var(--ease) both}
.greet-name{display:inline-block;opacity:0;color:var(--gold-b);font-style:italic;animation:wordSlideUp .6s .28s var(--ease) both}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
.eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
.hero-deal-name{font-family:var(--serif);font-style:italic;font-size:clamp(42px,7vw,78px);font-weight:400;line-height:1.04;color:var(--text);margin-bottom:14px;letter-spacing:-.015em}
.hero-tagline{font-size:14px;font-weight:400;color:var(--text-2);max-width:480px;margin-bottom:28px;line-height:1.8;font-family:var(--sans)}
.hero-stats{display:flex;gap:0;margin-bottom:36px;flex-wrap:wrap}
.hero-stat{padding:0 22px 0 0;margin-right:22px;border-right:1px solid var(--border)}
.hero-stat:last-child{border-right:none;padding-right:0;margin-right:0}
.hero-stat-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);line-height:1;margin-bottom:4px}
.hero-stat-lbl{font-size:11px;color:var(--text-3);letter-spacing:.04em;font-family:var(--sans)}
.hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-primary{position:relative;overflow:hidden;padding:14px 28px;background:var(--gold);font-size:13px;font-weight:600;letter-spacing:.03em;border-radius:2px;transition:all .25s var(--ease);font-family:var(--sans)}
.btn-primary,html .btn-primary{color:#0A0908}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.15) 50%,transparent 70%);transform:translateX(-100%);transition:transform .6s}
.btn-primary:hover{background:var(--gold-b);transform:translateY(-2px);box-shadow:0 10px 28px rgba(197,165,114,.25)}
.btn-primary:hover::after{transform:translateX(100%)}
.btn-ghost{padding:13px 22px;border:1px solid var(--border-m);color:var(--text-2);font-size:13px;font-weight:500;border-radius:2px;transition:all .22s;font-family:var(--sans)}
.btn-ghost:hover{border-color:var(--gold-bd);color:var(--gold);background:var(--gold-bg)}

/* urgency badge */
.urgency-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(176,94,86,.12);border:1px solid rgba(176,94,86,.3);border-radius:20px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:16px}
.ub-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
.social-proof{display:flex;align-items:center;gap:8px;margin-top:18px;font-size:12px;color:var(--text-3);font-family:var(--sans)}
.sp-avatars{display:flex}
.sp-avatar{width:22px;height:22px;border-radius:50%;background:var(--bg-3);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:7px;font-weight:500;color:var(--text-3);margin-left:-6px}
.sp-avatar:first-child{margin-left:0}
.hero-sub-bar-wrap{position:absolute;bottom:0;left:0;right:0}
.hero-sub-bar-track{height:2px;background:var(--border)}
.hero-sub-bar-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-b));transition:width 2s var(--ease)}
/* carousel dots + progress */
.hero-dots{position:absolute;bottom:16px;left:clamp(24px,5vw,72px);display:flex;align-items:center;gap:8px;z-index:10}
.hero-dot{width:20px;height:2px;border-radius:1px;background:var(--border-m);cursor:pointer;transition:all .3s var(--ease);position:relative;overflow:hidden}
.hero-dot.active{background:var(--gold);width:32px}
.hero-dot-fill{position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:left;border-radius:1px}
.hero-dot.active .hero-dot-fill{animation:dotProgress var(--carousel-ms,6000ms) linear forwards}
@keyframes dotProgress{to{transform:scaleX(1)}}
/* slide transition */
.hero-content{padding:clamp(44px,9vh,88px) clamp(24px,5vw,72px);display:flex;flex-direction:column;justify-content:center;z-index:2;position:relative;transition:opacity .45s var(--ease),transform .45s var(--ease)}
.hero-content.slide-out{opacity:0;transform:translateY(-10px)}
.hero-content.slide-in{animation:heroSlideIn .5s var(--ease) both}
@keyframes heroSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* eyebrow colour variants */
.hero-eyebrow.coming-soon .eyebrow-dot{background:var(--blue)}
.hero-eyebrow.coming-soon{color:var(--blue)}
.hero-eyebrow.almost-full .eyebrow-dot{background:var(--amber)}
.hero-eyebrow.almost-full{color:var(--amber)}

/* ── HERO VISUAL (prism side) ── */
.inv-vis-inner{display:flex;flex-direction:column;align-items:center;gap:16px;width:min(440px,92%)}
.inv-ring-row{display:flex;align-items:center;gap:16px;width:100%;background:rgba(13,12,10,.85);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px;backdrop-filter:blur(10px)}
.inv-ring-detail{flex:1;text-align:left}
.hero-visual{
  display:flex;align-items:center;justify-content:flex-start;
  padding-left:clamp(12px,3vw,40px);position:relative;overflow:hidden;
  background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(197,165,114,.06) 0%,transparent 68%);
  min-height:360px;z-index:1;
}
@media(min-width:900px){.hero-visual{min-height:auto}}
.prism-svg-wrap{
  position:relative;width:min(360px,88%);
  animation:prismEnter .9s .1s var(--ease) both, prismRotate 6s .9s ease-in-out infinite;
}
.prism-svg{width:100%;height:auto}

/* ring floated over prism */
.ring-float{display:none}
.ring-wrap{position:relative}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-track{fill:none;stroke:var(--border);stroke-width:5}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.6s var(--ease),stroke .3s}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-pct{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);line-height:1}
.ring-sub{font-size:9px;color:var(--text-3);letter-spacing:.08em;margin-top:2px;font-family:var(--sans)}
.ring-detail-card{padding:11px 15px;background:rgba(13,12,10,.85);border:1px solid var(--border);border-radius:var(--r);font-size:11px;color:var(--text-2);margin-top:10px;backdrop-filter:blur(10px);animation:fadeUp .6s .8s both;font-family:var(--sans)}
.ring-detail-card strong{color:var(--text);font-weight:500}
.inv-row{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.inv-tag{padding:2px 7px;border-radius:20px;font-family:var(--mono);font-size:8px;border:1px solid var(--border);color:var(--text-3);background:var(--bg-3)}
.inv-tag.urgent{border-color:var(--red-bd);color:var(--red);background:var(--red-bg)}

/* ── DEAL GRID SECTION ── */
.section{padding:clamp(32px,5vh,56px) clamp(24px,5vw,72px)}
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;gap:12px}
.section-title{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--text)}
.section-count{font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:.14em;text-transform:uppercase}

/* deal cards */
.deal-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:600px){.deal-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1100px){.deal-grid{grid-template-columns:repeat(4,1fr)}}
.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .22s var(--ease);position:relative;opacity:0;transform:translateY(18px)}
.deal-card.revealed{animation:cardReveal .55s var(--ease) forwards}
.deal-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4);border-color:var(--border-m)}
.deal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:opacity .2s}
.dc-credit::before{background:var(--blue)}.dc-pe::before{background:var(--gold)}.dc-re::before{background:var(--green)}.dc-infra::before{background:var(--slate)}
.dc-header{padding:18px 18px 12px}
.dc-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dc-logo{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500;flex-shrink:0;border:1px solid}
.dc-class-tag{padding:3px 9px;border:1px solid;border-radius:20px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase}
.dct-credit{color:var(--blue);border-color:var(--blue-bd);background:var(--blue-bg)}
.dct-pe{color:var(--gold);border-color:var(--gold-bd);background:var(--gold-bg)}
.dct-re{color:var(--green);border-color:var(--green-bd);background:var(--green-bg)}
.dct-infra{color:var(--slate);border-color:var(--slate-bd);background:var(--slate-bg)}
.dc-irr{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
.dc-irr span{font-size:9px;color:var(--text-3);font-weight:400}
.dc-name{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.2;color:var(--text);margin-bottom:5px}
.dc-meta{font-size:12px;color:var(--text-3);margin-bottom:14px;font-family:var(--sans)}
.dc-body{padding:0 18px 16px}
.dc-bar-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:5px}
.dc-bar-fill{height:100%;border-radius:1px;width:0;transition:width 1s var(--ease)}
.dc-bar-row{display:flex;justify-content:space-between}
.dc-bar-sub{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.dc-bar-sub.hot{color:var(--red)}
.dc-footer{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-top:1px solid var(--border);background:var(--bg-3)}
.dc-ticket{font-size:12px;color:var(--text-3);font-family:var(--sans)}
.dc-ticket strong{font-family:var(--mono);font-weight:500;color:var(--text-2)}
.dc-cta{font-size:12px;color:var(--gold);font-weight:500;display:flex;align-items:center;gap:5px;transition:gap .18s;font-family:var(--sans)}
.deal-card:hover .dc-cta{gap:8px}
.dc-oversubscribed{position:absolute;top:12px;right:12px;padding:2px 8px;background:rgba(90,158,114,.15);border:1px solid var(--green-bd);border-radius:20px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--green)}

/* ══════════════════════════════════════════
   DEAL DETAIL (slide-in overlay)
══════════════════════════════════════════ */
#view-deal{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform .42s var(--ease)}
#view-deal.open{transform:none}
.dd-inner{max-width:1200px;margin:0 auto;padding:calc(var(--nav-h) + 28px) clamp(24px,5vw,72px) 100px}
.dd-back{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text-3);margin-bottom:28px;transition:color .15s;font-family:var(--sans)}
.dd-back:hover{color:var(--gold)}
.dd-grid{display:grid;grid-template-columns:1fr;gap:40px}
@media(min-width:900px){.dd-grid{grid-template-columns:1fr 360px}}

/* deal detail left */
.dd-identity{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px}
.dd-logo{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:500;flex-shrink:0;border:1px solid}
.dd-tag{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dd-name{font-family:var(--serif);font-style:italic;font-size:clamp(34px,5vw,60px);font-weight:400;line-height:1.06;color:var(--text);margin-bottom:16px}
.dd-thesis{font-size:14px;line-height:1.9;color:var(--text-2);margin-bottom:28px;max-width:600px;font-family:var(--sans)}

/* highlights */
.hl-cards{display:grid;gap:8px;margin-bottom:30px}
.hl-card{padding:15px 18px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);transition:border-color .18s,transform .18s;animation:fadeUp .5s var(--ease) both}
.hl-card:hover{border-color:var(--gold-bd);transform:translateX(3px)}
.hl-icon{font-size:16px;margin-bottom:6px}
.hl-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--sans)}
.hl-body{font-size:13px;color:var(--text-2);line-height:1.6;font-family:var(--sans)}

/* return chart */
.chart-section{margin-bottom:30px}
.chart-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.return-chart{display:flex;align-items:flex-end;gap:10px;height:120px;padding:0 4px}
.rc-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.rc-bar{width:100%;border-radius:3px 3px 0 0;transition:height 1.1s var(--ease);min-height:8px}
.rc-down{background:var(--border-m)}
.rc-base{background:linear-gradient(to top,var(--gold),rgba(197,165,114,.7))}
.rc-up{background:linear-gradient(to top,var(--gold-b),var(--gold))}
.rc-val{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.rc-lbl{font-size:11px;color:var(--text-3);font-family:var(--sans)}
.hurdle-line{position:relative;margin-top:6px;display:flex;align-items:center;gap:8px}
.hurdle-dash{flex:1;height:1px;background:var(--amber-bd);border-top:1px dashed var(--amber)}
.hurdle-lbl{font-family:var(--mono);font-size:9px;color:var(--amber);white-space:nowrap}

/* stage timeline */
.tl{margin-bottom:30px;overflow-x:auto;padding-bottom:8px}
.tl-inner{display:flex;align-items:center;min-width:420px}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative}
.tl-node:not(:last-child)::after{content:'';position:absolute;left:50%;right:-50%;top:11px;height:1px;background:var(--border);z-index:0}
.tl-node.done:not(:last-child)::after{background:var(--gold-bd)}
.tl-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1;transition:all .3s;font-family:var(--mono)}
.tl-node.done .tl-circle{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold)}
.tl-node.curr .tl-circle{background:var(--gold);border-color:var(--gold);color:#0A0908;box-shadow:0 0 0 4px var(--gold-bg);animation:shimmer 2s infinite alternate}
.tl-lbl{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);text-align:center}
.tl-node.done .tl-lbl{color:var(--text-2)}.tl-node.curr .tl-lbl{color:var(--gold)}

/* docs section */
.docs-section{margin-bottom:30px}
.docs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:600px){.docs-grid{grid-template-columns:repeat(3,1fr)}}
.doc-card{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:border-color .18s;position:relative}
.doc-card.locked{opacity:.55;cursor:default}
.doc-card.unlocked{cursor:pointer}
.doc-card.unlocked:hover{border-color:var(--gold-bd)}
.doc-card-icon{font-size:20px;margin-bottom:8px}
.doc-card-type{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.doc-card-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;font-family:var(--sans)}
.doc-card-size{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.doc-lock-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase}
.dlb-locked{color:var(--amber)}
.dlb-unlocked{color:var(--green)}

/* NDA gate */
.nda-gate{padding:18px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);margin-bottom:16px;animation:fadeUp .3s var(--ease)}
.nda-gate-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;font-family:var(--sans)}
.nda-gate-body{font-size:12px;color:var(--text-2);margin-bottom:12px;line-height:1.6;font-family:var(--sans)}
.nda-toggle-row{display:flex;align-items:flex-start;gap:10px}
.toggle-sw{position:relative;width:36px;height:20px;flex-shrink:0;margin-top:1px}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--border-m);border-radius:20px;cursor:pointer;transition:background .2s}
.toggle-sw input:checked+.tog-track{background:var(--gold)}
.tog-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.toggle-sw input:checked+.tog-track+.tog-thumb{transform:translateX(16px)}
.tog-text{font-size:12px;color:var(--text-2);line-height:1.55;font-family:var(--sans)}

/* ── ACTION PANEL (right column) ── */
.action-panel{position:relative}
.action-sticky{position:sticky;top:calc(var(--nav-h) + 20px);display:flex;flex-direction:column;gap:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stat-cell{padding:14px 16px;background:var(--surface)}
.stat-lbl{font-size:10px;color:var(--text-3);letter-spacing:.06em;margin-bottom:4px;font-family:var(--sans)}
.stat-val{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);line-height:1}
.stat-val.gold{color:var(--gold)}.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}
.stat-cell.full{grid-column:1/-1}
.panel-ring-row{display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg-3);border-radius:var(--r);border:1px solid var(--border)}
.panel-ring-info{flex:1}
.pri-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--sans)}
.pri-detail{font-size:12px;color:var(--text-2);line-height:1.5;font-family:var(--sans)}
.pri-detail em{font-style:normal;font-weight:500;color:var(--text)}

/* IOI form */
.ioi-form{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden}
.ioi-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between;font-family:var(--sans)}
.ioi-body{padding:18px}
.ioi-lbl{font-size:11px;color:var(--text-3);letter-spacing:.05em;margin-bottom:7px;display:block;font-family:var(--sans)}
.ioi-input{width:100%;padding:12px 14px;font-family:var(--mono);font-size:16px;font-weight:500;border-radius:2px;background:var(--bg-3);border:1px solid var(--border-m);color:var(--text);margin-bottom:8px}
.ioi-input:focus{border-color:var(--gold)}
.ioi-slider{width:100%;margin-bottom:6px;accent-color:var(--gold);cursor:pointer}
.slider-marks{display:flex;justify-content:space-between;margin-bottom:12px}
.sm{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.ioi-est{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--bg-3);border-radius:var(--r);font-size:12px;margin-bottom:14px;border:1px solid var(--border)}
.ioi-est-lbl{color:var(--text-3);font-family:var(--sans)}
.ioi-est-val{font-family:var(--mono);font-weight:500;color:var(--green)}
.ioi-toggles{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.toggle-row{display:flex;align-items:flex-start;gap:10px}
.ioi-cta{width:100%;padding:14px;background:var(--gold);border-radius:2px;font-size:13px;font-weight:600;letter-spacing:.02em;transition:all .22s var(--ease);position:relative;overflow:hidden;font-family:var(--sans);color:#0A0908}
.ioi-cta:hover:not(:disabled){background:var(--gold-b);transform:translateY(-1px);box-shadow:0 8px 24px rgba(197,165,114,.25)}
.ioi-cta:disabled{opacity:.4;cursor:not-allowed}

/* IOI submitted state */
.ioi-submitted{padding:24px 18px;text-align:center;animation:fadeUp .4s var(--ease)}
.ioi-check{width:44px;height:44px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-bd);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);margin:0 auto 14px}
.ioi-s-title{font-family:var(--serif);font-size:20px;font-style:italic;color:var(--text);margin-bottom:8px}
.ioi-s-body{font-size:13px;color:var(--text-2);line-height:1.7;font-family:var(--sans)}

/* IOI status pipeline */
.ioi-pipeline{margin-top:14px;padding:12px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r)}
.pipeline-title{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.pipeline-steps{display:flex;align-items:center;gap:0}
.ps-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.ps-step:not(:last-child)::after{content:'';position:absolute;left:50%;right:-50%;top:8px;height:1px;background:var(--border)}
.ps-step.done:not(:last-child)::after{background:var(--green-bd)}
.ps-step.active:not(:last-child)::after{background:linear-gradient(to right,var(--green-bd),var(--border))}
.ps-circle{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:7px;z-index:1;transition:all .3s}
.ps-step.done .ps-circle{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.ps-step.active .ps-circle{background:var(--amber);border-color:var(--amber);color:#0A0908;animation:pulse 1.5s infinite}
.ps-lbl{font-family:var(--mono);font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);text-align:center}
.ps-step.done .ps-lbl{color:var(--green)}.ps-step.active .ps-lbl{color:var(--amber)}

/* ══════════════════════════════════════════
   PORTFOLIO
══════════════════════════════════════════ */
.portfolio-hero{padding:clamp(32px,5vh,56px) clamp(24px,5vw,72px) 0;border-bottom:1px solid var(--border)}
.ph-greet{font-size:13px;color:var(--text-3);margin-bottom:5px;font-family:var(--sans)}
.ph-name{font-family:var(--serif);font-style:italic;font-size:clamp(28px,4vw,44px);color:var(--text);margin-bottom:20px}
.ph-stats{display:flex;gap:32px;padding-bottom:24px;flex-wrap:wrap}
.ph-stat-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text)}
.ph-stat-lbl{font-size:11px;color:var(--text-3);margin-top:3px;font-family:var(--sans)}
.portfolio-body{padding:clamp(24px,4vh,40px) clamp(24px,5vw,72px)}
.alloc-section{margin-bottom:30px;display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:640px){.alloc-section{grid-template-columns:auto 1fr}}
.alloc-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.alloc-ring{position:relative;width:100px;height:100px}
.alloc-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.alloc-legend{display:flex;flex-direction:column;justify-content:center;gap:8px}
.al-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);font-family:var(--sans)}
.al-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.al-amt{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.pos-grid{display:grid;gap:12px}
@media(min-width:640px){.pos-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1000px){.pos-grid{grid-template-columns:1fr 1fr 1fr}}
.pos-card{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden;transition:all .22s var(--ease);animation:fadeUp .5s var(--ease) both}
.pos-card:hover{border-color:var(--gold-bd);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.3)}
.pos-card-top{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.pos-class-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pos-name{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--text);margin-bottom:4px}
.pos-sub{font-size:12px;color:var(--text-3);font-family:var(--sans)}
.pos-pipeline{margin-top:10px}
.pos-card-btm{padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.pos-amount{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
.pos-badge{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid}
.ps-pending{color:var(--amber);border-color:var(--amber-bd);background:var(--amber-bg)}
.ps-approved{color:var(--green);border-color:var(--green-bd);background:var(--green-bg)}

/* ── INVESTOR DATAROOM / Q&A ── */
.inv-dr-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.inv-dr-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;transition:all .15s;cursor:pointer;font-family:var(--sans);background:none;border-top:none;border-left:none;border-right:none}
.inv-dr-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.inv-dr-tab:hover:not(.on){color:var(--text-2)}
.inv-dr-section{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.inv-dr-folder-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:8px 14px 4px;background:var(--bg-3);border-bottom:1px solid var(--border)}
.inv-dr-file-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;transition:background .15s}
.inv-dr-file-row:last-child{border-bottom:none}
.inv-dr-file-row:hover{background:var(--bg-3)}
.inv-dr-file-name{flex:1;color:var(--text);font-family:var(--sans)}
.inv-dr-file-size{color:var(--text-3);font-family:var(--mono);font-size:10px}
.inv-dr-file-date{color:var(--text-3);font-family:var(--mono);font-size:10px}
.inv-dr-view-btn{font-family:var(--mono);font-size:9px;padding:3px 9px;border:1px solid var(--border-m);background:none;color:var(--text-2);border-radius:2px;cursor:pointer;transition:all .15s}
.inv-dr-view-btn:hover{border-color:var(--gold-bd);color:var(--gold)}
.inv-qa-chat{display:flex;flex-direction:column;gap:10px;padding:14px;max-height:420px;overflow-y:auto;scroll-behavior:smooth}
.inv-qa-bubble{display:flex;flex-direction:column;max-width:85%}
.inv-qa-bubble.investor{align-self:flex-end}
.inv-qa-bubble.advisor{align-self:flex-start}
.inv-qa-bubble-body{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.55}
.inv-qa-bubble.investor .inv-qa-bubble-body{background:var(--gold-bg);border:1px solid var(--gold-bd);color:var(--text)}
.inv-qa-bubble.advisor .inv-qa-bubble-body{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.inv-qa-bubble-meta{font-size:10px;color:var(--text-3);margin-top:4px;font-family:var(--mono);letter-spacing:.04em}
.inv-qa-bubble.investor .inv-qa-bubble-meta{text-align:right}
.inv-qa-pending{font-family:var(--mono);font-size:8px;padding:2px 7px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);border-radius:10px;margin-top:4px;letter-spacing:.06em;display:inline-block}
.inv-qa-compose{border-top:1px solid var(--border);padding:12px;background:var(--bg-2);display:flex;gap:8px;align-items:flex-end}
.inv-qa-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 10px;border-radius:6px;resize:none;height:56px;font-family:var(--sans);transition:border-color .15s}
.inv-qa-input:focus{outline:none;border-color:var(--gold-bd)}
.inv-qa-send-btn{font-family:var(--mono);font-size:9px;padding:8px 14px;background:var(--gold);color:#0A0908;border:none;border-radius:4px;cursor:pointer;font-weight:600;letter-spacing:.08em;height:36px;white-space:nowrap;align-self:flex-end}
.inv-qa-send-btn:disabled{opacity:.4;cursor:not-allowed}
.dd-deadline-banner{padding:10px 0;font-family:var(--mono);font-size:10px;letter-spacing:.08em;display:flex;align-items:center;gap:8px;margin-bottom:18px}
.dd-deadline-banner.active{color:var(--amber)}
.dd-deadline-banner.expired{color:var(--red)}
.inv-dr-empty{padding:28px;text-align:center;color:var(--text-3);font-size:13px;line-height:1.7}
/* File viewer modal */
.vdr-viewer-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.92);display:flex;flex-direction:column}
.vdr-viewer-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.vdr-viewer-title{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--text-2)}
.vdr-viewer-close{font-family:var(--mono);font-size:10px;padding:5px 14px;border:1px solid var(--border-m);background:none;color:var(--text-2);border-radius:2px;cursor:pointer;transition:all .15s}
.vdr-viewer-close:hover{border-color:var(--gold-bd);color:var(--gold)}
.vdr-viewer-frame{flex:1;position:relative;overflow:hidden}
.vdr-viewer-iframe{width:100%;height:100%;border:none}
.vdr-wm{position:absolute;inset:0;pointer-events:none;z-index:10;overflow:hidden}
.vdr-wm-inner{position:absolute;inset:-50%;display:flex;flex-direction:column;justify-content:space-around;opacity:.06;transform:rotate(-30deg);white-space:nowrap;overflow:hidden}
.vdr-wm-row{font-family:monospace;font-size:13px;color:white;letter-spacing:.04em;margin:14px 0}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:11px 20px;font-size:13px;border-radius:3px;z-index:999;opacity:0;transition:all .25s var(--ease);pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.3);font-family:var(--sans)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green);color:#fff}.toast.err{background:var(--red);color:#fff}
.demo-badge{position:fixed;bottom:16px;right:16px;z-index:300;padding:5px 11px;background:var(--bg-3);border:1px solid var(--border);font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);border-radius:20px}

@media(max-width:640px){
  .hero-stats{gap:14px}
  .dd-grid{grid-template-columns:1fr}
  .action-sticky{position:static;top:auto}
  .stat-grid{grid-template-columns:1fr 1fr}
  .docs-grid{grid-template-columns:1fr 1fr}
}

/* ── MOBILE FIXES ── */
@media(max-width:600px){
  /* Prevent iOS input zoom */
  input,select,textarea{font-size:16px!important}
  /* IOI range slider — larger touch target */
  .ioi-slider{height:44px;cursor:pointer}
  /* NDA toggle — larger touch zone */
  .toggle-row{min-height:44px;align-items:center}
  /* Hero actions — stack buttons */
  .hero-actions{flex-direction:column;gap:10px}
  .btn-primary,.btn-ghost{width:100%;text-align:center;padding:14px 20px}
  /* Hero stats compact */
  .hero-stats{gap:0;flex-wrap:wrap}
  .hero-stat{padding:0 14px 0 0;margin-right:14px}
  /* Return chart — taller on mobile for readability */
  .return-chart{height:140px}
  /* Nav tabs scroll */
  .nav-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .ntab{flex-shrink:0;padding:0 14px;white-space:nowrap}
  /* Deal overlay — full width */
  .view-deal{width:100vw!important;right:0!important}
  /* Portfolio stat cards */
  .ph-stats{gap:16px}
  .ph-stat-val{font-size:20px}
}
@media(max-width:480px){
  /* Docs grid — 1 column on small phones */
  .docs-grid{grid-template-columns:1fr}
  /* Stats grid — 1 column */
  .stat-grid{grid-template-columns:1fr}
  /* Allocation ring — hide ring, show legend only */
  .alloc-ring-wrap{display:none}
  .alloc-section{grid-template-columns:1fr}
  /* IOI form padding */
  .ioi-form{padding:14px}
  /* Deal grid — always 1 col on very small */
  .deal-grid{grid-template-columns:1fr!important}
  /* Thesis max-width */
  .dd-thesis{max-width:100%;font-size:14px}
  /* Highlight cards */
  .hl-grid{grid-template-columns:1fr}
  /* Hero stat val smaller */
  .hero-stat-val{font-size:18px}
}
/* ── EQUITY VALUE PATH ── */
.eq-scenarios{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.eq-sc{border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center}
.eq-sc.is-base{border-color:var(--gold-bd);background:var(--gold-bg)}
.eq-sc-name{font-size:9px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.eq-sc-irr{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);line-height:1}
.eq-sc-irr-lbl{font-size:9px;color:var(--text-3);font-family:var(--sans);margin-top:2px;margin-bottom:8px}
.eq-sc-moic{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--gold)}
.eq-sc-moic-lbl{font-size:9px;color:var(--text-3);font-family:var(--sans);margin-bottom:6px}
.eq-sc-exit{font-family:var(--mono);font-size:11px;color:var(--text-2)}
.eq-sc-exit-lbl{font-size:9px;color:var(--text-3);font-family:var(--sans)}
.vp-table{width:100%;border-collapse:collapse;margin-top:4px}
.vp-table th{font-size:9px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);text-align:left;padding:5px 6px;border-bottom:1px solid var(--border)}
.vp-table td{font-size:11px;font-family:var(--mono);padding:6px 6px;border-bottom:1px solid var(--border);color:var(--text-2)}
.vp-table tr:last-child td{color:var(--text);font-weight:500}
.vp-bar-cell{width:40%}
.vp-bar-track{background:var(--bg-3);height:4px;border-radius:2px;overflow:hidden}
.vp-bar-fill{height:4px;border-radius:2px;background:var(--gold);transition:width 1.2s var(--ease);width:0}
.vp-exit-tag{font-size:8px;padding:1px 5px;border:1px solid var(--gold-bd);color:var(--gold);border-radius:2px;font-family:var(--mono);letter-spacing:.05em;margin-left:4px;vertical-align:middle}
/* ── IOI CONFIRMATION ── */
.ioi-confirm{display:flex;flex-direction:column;align-items:center;padding:40px 24px 32px;text-align:center;animation:fadeUp .4s var(--ease)}
.ioi-confirm-check{width:56px;height:56px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-bd);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--green);margin-bottom:16px}
.ioi-confirm-title{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--text);margin-bottom:6px}
.ioi-confirm-deal{font-size:13px;color:var(--text-2);font-family:var(--sans);margin-bottom:16px}
.ioi-confirm-amount{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--text);margin-bottom:4px}
.ioi-confirm-amt-lbl{font-size:11px;color:var(--text-3);font-family:var(--sans);margin-bottom:24px}
.ioi-confirm-steps{width:100%;max-width:360px;text-align:left;margin-bottom:24px}
.ioi-confirm-step{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.ioi-confirm-step:last-child{border-bottom:none}
.ioi-confirm-step-num{width:20px;height:20px;border-radius:50%;background:var(--bg-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:var(--text-3);flex-shrink:0;margin-top:1px}
.ioi-confirm-step-text{font-size:12px;color:var(--text-2);font-family:var(--sans);line-height:1.6}
.ioi-confirm-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px}

/* ── PORTFOLIO CLOSE STAGE ── */
.pos-card-close{border-color:var(--green-bd);background:linear-gradient(135deg,var(--bg-2) 0%,rgba(90,158,114,0.04) 100%)}
.closing-stage-chip{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:20px;border:1px solid var(--green-bd);background:var(--green-bg);color:var(--green)}
.ps-close{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.wiring-cta{display:block;width:100%;margin-top:14px;padding:11px 16px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--green);cursor:pointer;text-align:center;transition:background .15s,color .15s}
.wiring-cta:hover{background:var(--green);color:#fff}

/* ── CLOSING INSTRUCTIONS OVERLAY ── */
.closing-instr-wrap{max-width:640px;margin:0 auto;padding:32px 24px 64px}
.closing-back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3);font-family:var(--sans);cursor:pointer;background:none;border:none;padding:0;margin-bottom:28px;transition:color .15s}
.closing-back-btn:hover{color:var(--gold)}
.ci-header{margin-bottom:24px}
.ci-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.ci-deal-name{font-family:var(--serif);font-style:italic;font-size:clamp(22px,4vw,34px);font-weight:400;color:var(--text);line-height:1.1;margin-bottom:14px}
.ci-amount-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r)}
.ci-amount-lbl{font-size:12px;color:var(--text-3);font-family:var(--sans)}
.ci-amount-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--gold);margin-left:auto;letter-spacing:.02em}
.ci-rule{height:1px;background:var(--border);margin:24px 0}
.ci-section-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-bottom:16px}
.ci-wire-table{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.ci-wire-row{display:grid;grid-template-columns:180px 1fr;gap:0;border-bottom:1px solid var(--border)}
.ci-wire-row:last-child{border-bottom:none}
.ci-wire-lbl{padding:12px 16px;font-size:11px;font-family:var(--mono);color:var(--text-3);letter-spacing:.06em;background:var(--bg-3);border-right:1px solid var(--border)}
.ci-wire-val{padding:12px 16px;font-size:13px;color:var(--text);line-height:1.5}
.ci-mono{font-family:var(--mono);font-size:12px;letter-spacing:.04em}
.ci-ref-block{padding:16px 20px;background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:var(--r);margin-bottom:8px}
.ci-ref-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.ci-ref-val{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--gold);letter-spacing:.06em;margin-bottom:4px}
.ci-ref-note{font-size:11px;color:var(--text-3);font-family:var(--sans)}
.ci-important-block{padding:18px 20px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);margin-bottom:20px}
.ci-imp-title{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.ci-imp-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.ci-imp-list li{font-size:13px;color:var(--text-2);line-height:1.5;padding-left:16px;position:relative}
.ci-imp-list li::before{content:'•';position:absolute;left:0;color:var(--amber)}
.ci-contact{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-3);font-family:var(--sans);margin-bottom:24px;flex-wrap:wrap}
.ci-actions{display:flex;gap:10px;flex-wrap:wrap}
.ci-pdf-btn{padding:11px 22px;background:var(--bg-3);border:1px solid var(--border-m);border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:500;color:var(--text-2);cursor:pointer;transition:border-color .15s,color .15s}
.ci-pdf-btn:hover{border-color:var(--gold-bd);color:var(--gold)}
.ci-back-btn{padding:11px 22px;background:var(--gold);border:none;border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:600;color:#0A0908;cursor:pointer;transition:opacity .15s}
.ci-back-btn:hover{opacity:.88}
@media(max-width:520px){
  .ci-wire-row{grid-template-columns:1fr}
  .ci-wire-lbl{border-right:none;border-bottom:1px solid var(--border);padding:8px 12px}
  .ci-wire-val{padding:8px 12px}
}
.inv-deal-ring{display:flex;align-items:center;justify-content:flex-start;gap:20px;width:100%;background:rgba(13,12,10,.85);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px 20px;backdrop-filter:blur(10px)}

/* ══════════════════════════════════════════
   MOBILE OVERRIDES — INVESTOR PORTAL
   Target: 390px iPhone 15 as baseline
   Breakpoints: ≤768px tablet+phone, ≤480px phone-only
══════════════════════════════════════════ */

/* ── 1. NAV: logo left, avatar right, tabs below ── */
@media(max-width:768px){
  .nav{
    height:auto;
    flex-wrap:wrap;
    padding:0 16px;
    gap:0;
    align-items:stretch;
  }
  /* Top row: wordmark + right controls */
  .nav-wordmark{
    padding:10px 0;
    flex:1;
  }
  /* Hide the vertical divider between wordmark and tabs on mobile */
  .nav-div{display:none}
  /* Tabs go on second row, full width, scrollable */
  .nav-tabs{
    order:99;
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    flex-wrap:nowrap;
    border-top:1px solid var(--border);
    padding:0 0 0 0;
    scrollbar-width:none;
  }
  .nav-tabs::-webkit-scrollbar{display:none}
  .ntab{
    flex-shrink:0;
    padding:10px 16px;
    font-size:13px;
    min-height:44px;
    display:flex;
    align-items:center;
  }
  /* Right controls: compress — show only avatar, hide text labels */
  .nav-r{
    gap:8px;
    padding:8px 0;
    align-items:center;
  }
  .nav-user-info{display:none}
  /* Sign out text: keep but shrink */
  .nav-r > button:last-child{
    font-size:9px;
    padding:4px 6px;
  }
  /* Update --nav-h to account for two-row nav */
  :root{--nav-h:88px}
}

/* ── 2. LOBBY HERO: stack columns on mobile, show compact prism ── */
@media(max-width:768px){
  .lobby-hero{
    grid-template-columns:1fr !important;
    min-height:auto;
  }
  /* Show prism visual as compact centered element above text */
  .hero-visual{
    display:flex !important;
    align-items:center;
    justify-content:center;
    min-height:200px !important;
    max-height:240px !important;
    padding:20px 0 0 !important;
    order:-1;
    background:none !important;
  }
  .inv-vis-inner{width:min(200px,72%) !important;gap:8px !important}
  .inv-deal-ring{display:none !important}
  /* Greeting: pin to top of content area, not overlapping body */
  .lobby-greeting{
    position:static;
    display:block;
    padding:12px 20px 0;
    font-size:13px;
    pointer-events:auto;
  }
  /* Hero content: full-width padding */
  .hero-content{
    padding:12px 20px 40px;
    justify-content:flex-start;
  }
  /* Deal name: clamp down from 78px max */
  .hero-deal-name{
    font-size:clamp(28px,8vw,48px) !important;
    margin-bottom:10px;
  }
  /* Tagline: full width */
  .hero-tagline{
    max-width:100%;
    font-size:14px;
    margin-bottom:20px;
  }
  /* Hero eyebrow */
  .hero-eyebrow{margin-bottom:14px}
  /* Urgency badge: allow wrap */
  .urgency-badge{
    flex-wrap:wrap;
    white-space:normal;
    max-width:100%;
    margin-bottom:12px;
  }
}

/* ── 3. HERO STATS: 2×2 grid on mobile ── */
@media(max-width:768px){
  .hero-stats{
    display:grid !important;
    grid-template-columns:1fr 1fr;
    gap:16px 0;
    margin-bottom:24px;
  }
  .hero-stat{
    padding:0 12px 0 0;
    margin-right:0;
    border-right:none;
    border-bottom:none;
  }
  /* Only right column items get a left border as separator */
  .hero-stat:nth-child(2n){
    padding-left:16px;
    border-left:1px solid var(--border);
  }
  .hero-stat-val{font-size:18px}
  .hero-stat-lbl{font-size:10px}
}

/* ── 4. HERO ACTIONS: full-width stacked column ── */
@media(max-width:768px){
  .hero-actions{
    flex-direction:column;
    gap:10px;
    align-items:stretch;
  }
  .hero-actions .btn-primary,
  .hero-actions .btn-ghost{
    width:100%;
    text-align:center;
    padding:15px 20px;
    justify-content:center;
  }
  /* Social proof compact */
  .social-proof{
    margin-top:14px;
    font-size:11px;
    flex-wrap:wrap;
  }
}

/* ── 5. HERO CAROUSEL DOTS ── */
@media(max-width:768px){
  .hero-dots{
    position:static;
    padding:8px 20px 16px;
    grid-column:1/-1;
  }
}

/* ── 6. DEAL DETAIL OVERLAY: full-screen fixed ── */
@media(max-width:768px){
  #view-deal{
    position:fixed;
    inset:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    z-index:100;
  }
  .dd-inner{
    padding:calc(var(--nav-h) + 16px) 16px 80px;
  }
  /* Back button: large touch target */
  .dd-back{
    min-height:44px;
    padding:10px 0;
    font-size:14px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
  }
  /* Deal detail grid: single column */
  .dd-grid{
    grid-template-columns:1fr !important;
    gap:24px;
  }
  /* Action panel: un-stick, flow naturally */
  .action-sticky{
    position:static !important;
    top:auto !important;
  }
  /* Deal name inside detail view */
  .dd-name{
    font-size:clamp(28px,7vw,44px);
  }
  /* Thesis body */
  .dd-thesis{
    max-width:100%;
    font-size:14px;
  }
}

/* ── 7. DEAL DETAIL TABS (data room / Q&A) ── */
@media(max-width:768px){
  .inv-dr-tabs{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    flex-wrap:nowrap;
    scrollbar-width:none;
  }
  .inv-dr-tabs::-webkit-scrollbar{display:none}
  .inv-dr-tab{
    flex-shrink:0;
    min-height:44px;
    display:flex;
    align-items:center;
    white-space:nowrap;
  }
}

/* ── 8. IOI FORM: full stretch, large inputs ── */
@media(max-width:768px){
  .ioi-form{border-radius:var(--r)}
  .ioi-body{padding:16px}
  .ioi-cta{
    width:100%;
    padding:16px;
    font-size:14px;
  }
  /* IOI confirmation buttons: full width column */
  .ioi-confirm-btns{
    width:100%;
    max-width:100%;
  }
  .ioi-confirm{
    padding:28px 16px 24px;
  }
  /* Prevent amount display from overflowing */
  .ioi-confirm-amount{
    font-size:clamp(20px,6vw,28px);
  }
}

/* ── 9. PORTFOLIO VIEW ── */
@media(max-width:768px){
  .portfolio-hero{
    padding:20px 16px 0;
  }
  .ph-stats{
    gap:20px;
    padding-bottom:20px;
    flex-wrap:wrap;
  }
  .ph-stat-val{font-size:20px}
  .portfolio-body{
    padding:20px 16px;
  }
  /* Position cards: single column */
  .pos-grid{
    grid-template-columns:1fr !important;
  }
  /* Allocation section: stack */
  .alloc-section{
    grid-template-columns:1fr !important;
  }
  /* Allocation ring: center on mobile, reduce size */
  .alloc-ring-wrap{
    align-items:center;
  }
}

/* ── 10. INV-DEAL-RING (hero subscription ring) ── */
@media(max-width:768px){
  /* Ring is inside hero-visual which is hidden — no-op, but guard anyway */
  .inv-deal-ring{
    padding:12px 14px;
    gap:12px;
  }
  .inv-deal-ring .ring-wrap{
    width:80px !important;
    height:80px !important;
    flex-shrink:0;
  }
  .inv-deal-ring .ring-pct{font-size:14px}
  .inv-deal-ring .ring-sub{font-size:8px}
}

/* ── 11. STAT GRID (action panel) ── */
@media(max-width:768px){
  .stat-grid{
    grid-template-columns:1fr 1fr;
  }
  .stat-val{font-size:15px}
}

/* ── 12. RETURN CHART / EQUITY SCENARIOS ── */
@media(max-width:768px){
  .eq-scenarios{
    grid-template-columns:1fr 1fr 1fr;
    gap:6px;
  }
  .eq-sc{padding:10px 8px}
  .eq-sc-irr{font-size:15px}
  .eq-sc-moic{font-size:12px}
  .return-chart{height:130px;gap:6px}
  /* Value path table: allow horizontal scroll */
  .vp-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* ── 13. STAGE TIMELINE ── */
@media(max-width:768px){
  .tl{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tl-inner{min-width:360px}
  .tl-lbl{font-size:7px}
}

/* ── 14. DOCS GRID ── */
@media(max-width:768px){
  .docs-grid{grid-template-columns:1fr 1fr}
}

/* ── 15. SECTION PADDING ── */
@media(max-width:768px){
  .section{
    padding:28px 16px;
  }
  .section-hd{
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:16px;
  }
}

/* ── 16. FILE VIEWER MODAL ── */
@media(max-width:768px){
  .vdr-viewer-bar{
    padding:10px 14px;
    flex-wrap:wrap;
    gap:8px;
  }
  .vdr-viewer-close{
    min-height:44px;
    padding:8px 16px;
  }
}

/* ── 17. CLOSING INSTRUCTIONS ── */
@media(max-width:768px){
  .closing-instr-wrap{
    padding:24px 16px 60px;
  }
  .ci-actions{flex-direction:column}
  .ci-pdf-btn,
  .ci-back-btn{
    width:100%;
    text-align:center;
    padding:13px 16px;
  }
}

/* ── 18. WIRE TABLE ── */
@media(max-width:768px){
  .ci-wire-row{grid-template-columns:1fr}
  .ci-wire-lbl{border-right:none;border-bottom:1px solid var(--border);padding:8px 12px}
  .ci-wire-val{padding:8px 12px}
}

/* ═══════════════════════════
   PHONE-ONLY (≤480px)
═══════════════════════════ */

/* ── A. Tightest nav ── */
@media(max-width:480px){
  .nav{padding:0 12px}
  .nav-wm-aurum,.nav-wm-prism{font-size:11px}
  .nav-wm-tacc{font-size:5px}
  :root{--nav-h:84px}
}

/* ── B. Hero: phone-specific tightening ── */
@media(max-width:480px){
  .lobby-greeting{padding:14px 16px 0;font-size:12px}
  .hero-content{padding:12px 16px 32px}
  .hero-deal-name{font-size:clamp(26px,9vw,40px) !important}
  .hero-stats{
    grid-template-columns:1fr 1fr;
    gap:12px 0;
  }
  .hero-stat-val{font-size:16px}
  .hero-stat-lbl{font-size:9px}
  .hero-eyebrow{font-size:8px;margin-bottom:10px}
}

/* ── C. Deal cards: guaranteed 1 column ── */
@media(max-width:480px){
  .deal-grid{grid-template-columns:1fr !important}
  .dc-header{padding:14px 14px 10px}
  .dc-body{padding:0 14px 12px}
  .dc-footer{padding:9px 14px}
}

/* ── D. Deal detail on phones ── */
@media(max-width:480px){
  .dd-inner{padding:calc(var(--nav-h) + 12px) 12px 72px}
  .dd-name{font-size:clamp(24px,8vw,36px)}
  .dd-thesis{font-size:13px}
  .hl-card{padding:12px 14px}
}

/* ── E. Docs grid: 1 col on phones ── */
@media(max-width:480px){
  .docs-grid{grid-template-columns:1fr !important}
}

/* ── F. Equity scenarios: stack on tiny screens ── */
@media(max-width:480px){

function buildReturnChart(d) {
  const isEquity = d.asset_class === 'pe';
  const termYrs = Math.max(1, Math.ceil(d.term / 12));
  if (isEquity) {
    const irrBase = d.target_irr / 100;
    const irrDown = Math.max(0.05, Math.round(irrBase * 0.6 * 100) / 100);
    const irrUp   = Math.round(irrBase * 1.35 * 100) / 100;
    const moicBase = Math.pow(1 + irrBase, termYrs);
    const moicDown = Math.pow(1 + irrDown, termYrs);
    const moicUp   = Math.pow(1 + irrUp, termYrs);
    const inv = 500000;
    const scenarios = [
      { name:'Conservative', irr:Math.round(irrDown*100), moic:moicDown, val:Math.round(inv*moicDown), cls:'' },
      { name:'Base Case',    irr:d.target_irr,            moic:moicBase, val:Math.round(inv*moicBase), cls:'is-base' },
      { name:'Upside',       irr:Math.round(irrUp*100),   moic:moicUp,   val:Math.round(inv*moicUp),   cls:'' },
    ];
    const scenHtml = scenarios.map(s => `<div class="eq-sc ${s.cls}">
      <div class="eq-sc-name">${s.name}</div>
      <div class="eq-sc-irr">${s.irr}%</div>
      <div class="eq-sc-irr-lbl">Target IRR</div>
      <div class="eq-sc-moic">${s.moic.toFixed(2)}×</div>
      <div class="eq-sc-moic-lbl">MOIC at exit</div>
      <div class="eq-sc-exit">${fmU(s.val)}</div>
      <div class="eq-sc-exit-lbl">Exit value on $500K</div>
    </div>`).join('');
    let rowsHtml = '';
    const maxVal = Math.round(inv * moicBase);
    for (let yr = 1; yr <= Math.min(termYrs, 5); yr++) {
      const val  = Math.round(inv * Math.pow(1 + irrBase, yr));
      const moic = Math.pow(1 + irrBase, yr);
      const pct  = Math.round(val / maxVal * 100);
      const isExit = yr === termYrs;
      rowsHtml += `<tr>
        <td>Yr ${yr}${isExit ? ' <span class="vp-exit-tag">TARGET EXIT</span>' : ''}</td>
        <td>${fmU(val)}</td>
        <td>${moic.toFixed(2)}×</td>
        <td class="vp-bar-cell"><div class="vp-bar-track"><div class="vp-bar-fill" data-pct="${pct}"></div></div></td>
      </tr>`;
    }
    return `<div class="chart-section">
      <div class="chart-lbl">Value Path · $500K at Base Case IRR · ${termYrs}-Year Hold</div>
      <div class="eq-scenarios" id="rc-chart">${scenHtml}</div>
      <div class="chart-lbl" style="margin-top:4px;margin-bottom:8px">Year-by-Year Projection · Base Case ${d.target_irr}% IRR</div>
      <table class="vp-table">
        <thead><tr><th>Period</th><th>Value</th><th>MOIC</th><th></th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
  }
  // Income / yield chart (credit, infra, RE)
  return `<div class="chart-section">
    <div class="chart-lbl">${d.asset_class === 're' ? 'Distribution & Return Scenarios' : 'Income Scenarios'} · $500K Invested at Base Case</div>
    <div class="return-chart" id="rc-chart">
      <div class="rc-wrap"><div class="rc-val" id="rc-dv">—</div><div class="rc-bar rc-down" id="rc-d" style="height:0"></div><div class="rc-lbl">Downside</div></div>

function toast(msg, k='') {

function showView(name, btn) {

/* ── LOBBY ── */
let _carouselSlides = [];
let _carouselIdx   = 0;
let _carouselTimer = null;
const CAROUSEL_MS  = 6000;

function initLobby() {
  const publicDeals = DEALS.filter(d => !d.launch_mode || d.launch_mode !== 'preview');

  // Build 3 carousel slots
  const featuredDeal  = publicDeals.find(d => d.featured) || publicDeals[0];
  // "Almost Full" — highest subscription % among non-featured, at least 50% subscribed
  const almostFull = publicDeals
    .filter(d => d.id !== featuredDeal.id && d.target_alloc > 0)
    .sort((a,b) => (b.ioi_agg/b.target_alloc) - (a.ioi_agg/a.target_alloc))
    .find(d => d.ioi_agg / d.target_alloc >= 0.5)
    || publicDeals.filter(d => d.id !== featuredDeal.id)[0];
  // "Coming Soon" — a different deal (prefer one not already used, lowest subscription)
  const usedIds = new Set([featuredDeal.id, almostFull?.id]);
  const comingSoon = publicDeals.filter(d => !usedIds.has(d.id))[0] || publicDeals[1] || featuredDeal;

  _carouselSlides = [
    { deal: featuredDeal, mode: 'featured' },
    { deal: comingSoon,   mode: 'coming_soon' },
    { deal: almostFull || featuredDeal, mode: 'almost_full' },
  ];

  // Render dot indicators
  const dotsEl = document.getElementById('hero-dots');
  dotsEl.innerHTML = _carouselSlides.map((_, i) =>
    `<div class="hero-dot${i===0?' active':''}" id="hero-dot-${i}" onclick="heroGoTo(${i})"><div class="hero-dot-fill"></div></div>`
  ).join('');
  document.documentElement.style.setProperty('--carousel-ms', CAROUSEL_MS + 'ms');

  // Render deal grid (all except featured slot)
  const others = publicDeals.filter(d => !d.featured);
  document.getElementById('other-count').textContent = `${others.length} Active`;
  document.getElementById('deal-grid').innerHTML = others.map(d => {
    const p  = Math.round(d.ioi_agg / d.target_alloc * 100);
    const cl = Math.round((new Date(d.closing) - new Date()) / 86400000);
    const hot = p >= 80;
    const barColor = d.asset_class === 'credit' ? 'var(--blue)' : d.asset_class === 're' ? 'var(--green)' : d.asset_class === 'infra' ? 'var(--slate)' : 'var(--gold)';
    return `<div class="deal-card dc-${d.asset_class}" id="dcard-${d.id}" onclick="openDeal('${d.id}')">
      ${hot ? `<div class="dc-oversubscribed">${p}% — Filling Fast</div>` : ''}
      <div class="dc-header">
        <div class="dc-top-row">
          <div class="dc-logo" style="color:${d.logo_color};background:${d.logo_bg};border-color:${d.logo_bd}">${d.ticker}</div>
          <span class="dc-irr">${d.target_irr}%<span> IRR</span></span>
        </div>
        <div style="margin-bottom:6px"><span class="dc-class-tag ${CLASS_TAG[d.asset_class]}">${CLASS_LABEL[d.asset_class]}</span></div>
        <div class="dc-name">${d.name}</div>
        <div class="dc-meta">${d.geography} · ${d.structure} · ${cl > 0 ? cl + ' days' : 'Closing soon'}</div>
      </div>
      <div class="dc-body">
        <div class="dc-bar-track"><div class="dc-bar-fill" data-pct="${p}" style="width:0%;background:${barColor}"></div></div>
        <div class="dc-bar-row">
          <span class="dc-bar-sub ${hot ? 'hot' : ''}">${p}% indicated</span>
          <span class="dc-bar-sub">${fmU(d.ioi_agg)}</span>
        </div>
      </div>
      <div class="dc-footer">
        <div class="dc-ticket">Min <strong>${fmU(d.min_ticket)}</strong></div>
        <div class="dc-cta">View Deal <span>→</span></div>
      </div>
    </div>`;
  }).join('');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting) {
        e.target.classList.add('revealed');
        const bar = e.target.querySelector('.dc-bar-fill');
        if(bar) setTimeout(() => { bar.style.transition = 'width 1s var(--ease)'; bar.style.width = bar.dataset.pct + '%'; }, 200);
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.deal-card').forEach(c => obs.observe(c));

  // Kick off carousel
  _carouselIdx = 0;
  setHeroSlide(0, true);
  startCarouselTimer();
}

function setHeroSlide(idx, instant) {
  _carouselIdx = idx;
  const { deal: d, mode } = _carouselSlides[idx];
  const pct  = Math.round(d.ioi_agg / d.target_alloc * 100);
  const days = Math.round((new Date(d.closing) - new Date()) / 86400000);

  const content = document.querySelector('.hero-content');
  if(!instant) {
    content.classList.add('slide-out');
    setTimeout(() => applyHeroSlide(d, mode, pct, days, content), 300);
  } else {
    applyHeroSlide(d, mode, pct, days, content);
  }

  // Update dots
  document.querySelectorAll('.hero-dot').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    // Restart CSS progress animation on active dot
    if(i === idx) {
      const fill = el.querySelector('.hero-dot-fill');
      fill.style.animation = 'none';
      fill.offsetWidth; // reflow
      fill.style.animation = '';
    }
  });
}

function applyHeroSlide(d, mode, pct, days, content) {
  const urgency = document.getElementById('hero-urgency');
  const eyebrow = document.querySelector('.hero-eyebrow');
  const eyebrowTxt = document.getElementById('hero-eyebrow-txt');

  // Mode-specific labels
  const modeConfig = {
    featured:   { label: 'Featured Opportunity', urgency: pct >= 90, cls: '' },
    coming_soon:{ label: 'Coming Soon — Accepting Interest', urgency: false, cls: 'coming-soon' },
    almost_full:{ label: `${pct}% Subscribed — Filling Fast`, urgency: pct >= 80, cls: 'almost-full' },
  };
  const cfg = modeConfig[mode] || modeConfig.featured;

  urgency.style.display = cfg.urgency ? 'inline-flex' : 'none';
  eyebrow.className = 'hero-eyebrow' + (cfg.cls ? ' ' + cfg.cls : '');
  eyebrowTxt.textContent = cfg.label;

  document.getElementById('hero-name').textContent    = d.name;
  document.getElementById('hero-tagline').textContent = d.tagline;
  document.getElementById('hero-stats').innerHTML =
    `<div class="hero-stat" style="animation:statReveal .5s .35s var(--ease) both"><div class="hero-stat-val" data-countup="${d.target_irr}" data-suffix="%">0%</div><div class="hero-stat-lbl">Target IRR</div></div>
     <div class="hero-stat" style="animation:statReveal .5s .48s var(--ease) both"><div class="hero-stat-val">${fmU(d.target_alloc)}</div><div class="hero-stat-lbl">Allocation</div></div>
     <div class="hero-stat" style="animation:statReveal .5s .61s var(--ease) both"><div class="hero-stat-val">${fmU(d.min_ticket)}</div><div class="hero-stat-lbl">Min Ticket</div></div>
     <div class="hero-stat" style="animation:statReveal .5s .74s var(--ease) both"><div class="hero-stat-val" data-countup="${d.term}" data-suffix="mo">0mo</div><div class="hero-stat-lbl">Term</div></div>`;
  // Count-up animation on numeric stats
  requestAnimationFrame(function(){
    document.querySelectorAll('#hero-stats [data-countup]').forEach(function(el){
      var target=parseFloat(el.dataset.countup),suffix=el.dataset.suffix||'',start=performance.now(),dur=900;
      function step(now){var t=Math.min((now-start)/dur,1),ease=1-Math.pow(1-t,3);
        el.textContent=Math.round(ease*target)+suffix;if(t<1)requestAnimationFrame(step);}
      requestAnimationFrame(step);
    });
  });

  document.getElementById('hero-cta-1').textContent = mode === 'coming_soon' ? 'Register Interest →' : 'Explore Opportunity →';
  document.getElementById('hero-cta-1').onclick = () => openDeal(d.id);
  document.getElementById('hero-cta-2').textContent = 'Express Interest';
  document.getElementById('hero-cta-2').onclick = () => openDeal(d.id, 'ioi');

  document.getElementById('hero-ring-pct').textContent   = pct + '%';
  document.getElementById('hero-sub-amt').textContent    = fmU(d.ioi_agg);
  document.getElementById('hero-alloc-disp').textContent = fmU(d.target_alloc);
  document.getElementById('hero-inv-count').textContent  = `${d.ioi_count || 0} investors`;
  document.getElementById('hero-days').textContent       = days > 0 ? `${days} days left` : 'Closing soon';

  document.getElementById('social-proof').innerHTML =
    `<div class="sp-avatars">${(d.ioi_investors||[]).slice(0,5).map((n,i) => `<div class="sp-avatar" style="animation-delay:${i*80}ms">${n.slice(0,2).toUpperCase()}</div>`).join('')}</div>
     <span><strong style="color:var(--text)">${d.ioi_count || 0} institutions</strong> have indicated interest</span>`;

  // Ring + bar
  const ringStroke = cfg.urgency ? 'var(--red)' : mode === 'coming_soon' ? 'var(--blue)' : 'var(--gold)';
  const barBg = cfg.urgency
    ? 'linear-gradient(to right,var(--gold),var(--red))'
    : mode === 'coming_soon'
      ? 'linear-gradient(to right,var(--blue),var(--blue))'
      : 'linear-gradient(to right,var(--gold),var(--gold-b))';
  setTimeout(() => {
    const r = document.getElementById('hero-ring');
    r.style.stroke = ringStroke;
    r.style.strokeDashoffset = 295 * (1 - pct / 100);
    r.style.transition = 'stroke-dashoffset 1.2s var(--ease), stroke .4s';
    const bar = document.getElementById('hero-sub-bar');
    bar.style.transition = 'width 1.2s var(--ease)';
    bar.style.width = pct + '%';
    bar.style.background = barBg;
  }, 120);

  content.classList.remove('slide-out');
  content.classList.remove('slide-in');
  content.offsetWidth;
  content.classList.add('slide-in');
}

function heroGoTo(idx) {
  if(idx === _carouselIdx) return;
  clearInterval(_carouselTimer);
  setHeroSlide(idx);
  startCarouselTimer();
}

function startCarouselTimer() {
  clearInterval(_carouselTimer);
  _carouselTimer = setInterval(() => {
    heroGoTo((_carouselIdx + 1) % _carouselSlides.length);
  }, CAROUSEL_MS);
}

/* ── DEAL DETAIL ── */
async function openDeal(id, action) {
  const d = DEALS.find(x => x.id === id);
  if(!d) return;
  activeDeal = id;
  const ci      = STAGE_ORDER.indexOf(d.stage);
  const pct     = Math.round(d.ioi_agg / d.target_alloc * 100);
  const days    = Math.round((new Date(d.closing) - new Date()) / 86400000);
  const overSub = pct >= 100;

  // Timeline
  const tlHtml = `<div class="tl"><div class="tl-inner">${STAGE_ORDER.map((s, i) => {
    const cls  = i < ci ? 'done' : i === ci ? 'curr' : '';
    const icon = i < ci ? '✓' : i === ci ? '●' : '○';
    return `<div class="tl-node ${cls}"><div class="tl-circle">${icon}</div><div class="tl-lbl">${STAGE_LABELS[s]}</div></div>`;
  }).join('')}</div></div>`;

  // Fetch real docs from API
  let realDocs = [];
  let apiNdaSigned = false;
  const docsRes = await fetchSilent(`/api/v2?resource=inst&op=inst-deal-docs&dealId=${id}`);
  if (docsRes?.docs?.length) {
    realDocs = docsRes.docs;
    apiNdaSigned = docsRes.nda_signed || false;
    if (apiNdaSigned) ndaSigned[id] = true;
  }
  const signed = !!ndaSigned[id];

  // Documents — gated by IOI submission stage
  const SLOT_ICON = { nda: '🔑', mgmt: '📄', fin: '📊', term: '📋' };
  const hasIoi = PORTFOLIO.some(p => p.deal_id === id);
  const ndaDocEntry = { slot: 'nda', label: 'NDA Template', name: 'NDA_'+d.ticker+'_v1.pdf', gate: 'public', accessible: true };
  let docs;
  if (!hasIoi) {
    docs = [ndaDocEntry];
  } else {
    const fullFallback = [
      ndaDocEntry,
      { slot: 'mgmt', label: 'Management Presentation', name: d.ticker+'_ManagementDeck.pdf', gate: 'nda', accessible: signed },
      { slot: 'fin',  label: 'Financial Summary',       name: d.ticker+'_Financials.xlsx',    gate: 'nda', accessible: signed },
      ...(d.asset_class!=='Equity'?[{ slot: 'term', label: 'Term Sheet', name: d.ticker+'_TermSheet.pdf', gate: 'nda', accessible: signed }]:[]),
    ];
    docs = realDocs.length ? realDocs.map(doc => ({...doc, accessible: doc.gate === 'public' || signed})) : fullFallback;
  }

  const docsLockedNote = !hasIoi
    ? `<div style="font-size:12px;color:var(--text-3);font-family:var(--sans);margin-top:10px;padding:10px 12px;background:var(--bg-3);border-radius:var(--r);border:1px solid var(--border)">Additional documents — Management Presentation, Financials${d.asset_class!=='Equity'?', Term Sheet':''} — unlock after submitting an expression of interest.</div>`
    : '';

  const docsHtml = docs.map(doc => {
    const locked = !doc.accessible;
    const icon = SLOT_ICON[doc.slot] || '📄';
    return `<div class="doc-card ${locked ? 'locked' : 'unlocked'}" onclick="${!locked ? `viewInvestorDoc('${id}','${doc.slot}')` : `toast('Sign NDA to unlock','err')`}">
      <div class="doc-card-icon">${icon}</div>
      <div class="doc-card-type">${doc.label}</div>
      <div class="doc-card-name">${locked ? '••••••••••.pdf' : (doc.name || doc.label)}</div>
      <div class="doc-card-size">${locked ? '—' : (doc.size || 'Available')}</div>
      <div class="doc-lock-badge ${locked ? 'dlb-locked' : 'dlb-unlocked'}">
        ${doc.gate === 'public' ? '🌐 Public' : locked ? '🔒 NDA Required' : '🔓 Available'}
      </div>
    </div>`;
  }).join('');

  // Build dataroom tab HTML (only for dd stage)
  const isDd = d.stage === 'dd';
  const ddTabBtn  = isDd ? `<button class="inv-dr-tab" id="inv-tab-btn-dataroom" onclick="invShowDealTab('dataroom',this)">Dataroom / Q&amp;A</button>` : '';
  const ddTabPanel = isDd ? `<div id="inv-tab-dataroom" style="display:none"></div>` : '';

  document.getElementById('dd-left').innerHTML = `
    <div class="dd-identity">
      <div class="dd-logo" style="color:${d.logo_color};background:${d.logo_bg};border-color:${d.logo_bd};width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:500;flex-shrink:0;border:1px solid">${d.ticker}</div>
      <div>
        <div class="dd-tag">
          <span class="dc-class-tag ${CLASS_TAG[d.asset_class]}">${CLASS_LABEL[d.asset_class]}</span>
          <span>${d.geography}</span> · <span>${d.structure}</span>
        </div>
      </div>
    </div>
    <h1 class="dd-name">${d.name}</h1>
    <p class="dd-thesis">${d.thesis}</p>
    ${isDd ? `<div class="inv-dr-tabs">
      <button class="inv-dr-tab on" id="inv-tab-btn-overview" onclick="invShowDealTab('overview',this)">Overview</button>
      ${ddTabBtn}
    </div>` : ''}
    <div id="inv-tab-overview">
      <div class="hl-cards">${d.highlights.map((h, i) => `<div class="hl-card" style="animation-delay:${i * 55}ms"><div class="hl-icon">${h.icon}</div><div class="hl-title">${h.s}</div><div class="hl-body">${h.b}</div></div>`).join('')}</div>
      ${buildReturnChart(d)}
      ${tlHtml}
      <div class="docs-section">
        <div class="chart-lbl" style="margin-bottom:12px">Deal Documents</div>
        <div class="docs-grid">${docsHtml}</div>
        ${docsLockedNote}
      </div>
    </div>
    ${ddTabPanel}`;

  // Right panel
  document.getElementById('dd-right').innerHTML = `
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-lbl">Target IRR</div><div class="stat-val gold">${d.target_irr}%</div></div>
      <div class="stat-cell"><div class="stat-lbl">Term</div><div class="stat-val">${d.term}mo</div></div>

    </div>
    <div class="panel-ring-row">
      <div class="ring-wrap" style="width:78px;height:78px">
        <svg width="78" height="78" viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" id="panel-ring" cx="55" cy="55" r="46" style="stroke-dasharray:289;stroke-dashoffset:289"/>
        </svg>
        <div class="ring-label"><div class="ring-pct" id="panel-ring-pct" style="font-size:13px">—</div></div>
      </div>
      <div class="panel-ring-info">

          <div class="nda-gate-title">NDA Required</div>
          <div class="nda-gate-body">To access full deal documents and submit an expression of interest, please confirm your agreement to the Non-Disclosure Agreement for this transaction.</div>

            <span class="ioi-est-val" id="ioi-est">—</span>

    document.getElementById('pri-title').textContent = overSub ? 'Oversubscribed' : `${pct}% Subscribed`;
    document.getElementById('pri-detail').innerHTML = `<em>${fmU(d.ioi_agg)}</em> of ${fmU(d.target_alloc)}<br>from <em>${d.ioi_count} investors</em>`;
    const r = document.getElementById('panel-ring');
    r.style.stroke = overSub ? 'var(--green)' : pct >= 80 ? 'var(--amber)' : 'var(--gold)';
    r.style.strokeDashoffset = 289 * (1 - pct / 100);
    r.style.transition = 'stroke-dashoffset 1.5s var(--ease)';
  }, 350);

  // Return chart animation — asset-class aware
  if (d.asset_class === 'pe') {
    setTimeout(() => {
      document.querySelectorAll('.vp-bar-fill').forEach(el => {
        el.style.width = (el.dataset.pct || 0) + '%';
      });
    }, 350);
  } else {
    const inv  = 500000;
    const vals = [
      Math.round(inv * Math.max(d.target_irr - 5, 1) / 100),
      Math.round(inv * d.target_irr / 100),
      Math.round(inv * (d.target_irr + 4) / 100),
    ];
    const maxV = Math.max(...vals);
    const dvEl = document.getElementById('rc-dv');
    const bvEl = document.getElementById('rc-bv');
    const uvEl = document.getElementById('rc-uv');
    if(dvEl) dvEl.textContent = '$' + (vals[0] / 1000).toFixed(0) + 'K/yr';
    if(bvEl) bvEl.textContent = '$' + (vals[1] / 1000).toFixed(0) + 'K/yr';
    if(uvEl) uvEl.textContent = '$' + (vals[2] / 1000).toFixed(0) + 'K/yr';
    setTimeout(() => {
      [['rc-d', vals[0]], ['rc-b', vals[1]], ['rc-u', vals[2]]].forEach(([id, v]) => {
        const el = document.getElementById(id);
        if(el){ el.style.transition = 'height 1.1s var(--ease)'; el.style.height = Math.round(v / maxV * 100) + 'px'; }
      });
    }, 300);
  }

  // Slider sync
  function syncSlider() {
    const v = readAmt(document.getElementById('ioi-input'));
    const sldEl = document.getElementById('ioi-slider');
    if(sldEl) sldEl.value = Math.min(v, 5000000);
    const estEl = document.getElementById('ioi-est');
    if(!estEl) return;
    if (d.asset_class === 'pe') {
      const termYrs = Math.max(1, Math.ceil(d.term / 12));
      const moic = Math.pow(1 + d.target_irr / 100, termYrs);
      estEl.textContent = v > 0 ? fmFull(Math.round(v * moic)) + ` at ${termYrs}yr` : '—';
    } else {
      estEl.textContent = v > 0 ? fmFull(Math.round(v * d.target_irr / 100)) + ' / yr' : '—';
    }
  }
  const sld = document.getElementById('ioi-slider');
  if(sld) sld.addEventListener('input', function() {
    const inp = document.getElementById('ioi-input');
    inp.value = parseInt(this.value).toLocaleString('en-US');
    syncSlider();
  });
  syncSlider();

  document.getElementById('view-deal').classList.add('open');
  document.getElementById('view-deal').scrollTop = 0;
  if(action === 'ioi') setTimeout(() => document.getElementById('ioi-form')?.scrollIntoView({ behavior: 'smooth' }), 450);
}
