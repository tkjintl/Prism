<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurum Prism · Reset Password</title><meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060605;--surface:#0e0d0c;--input-bg:#09090a;
  --gold:#C5A572;--goldB:#DEB97A;--goldD:#8a7c68;
  --goldBd:rgba(197,165,114,.22);--goldBdS:rgba(197,165,114,.5);--goldW:rgba(197,165,114,.06);
  --red:#b05e56;--redBd:rgba(176,94,86,.26);--redW:rgba(176,94,86,.07);
  --green:#5a9e72;--greenBd:rgba(90,158,114,.28);--greenW:rgba(90,158,114,.07);
  --wire:rgba(255,255,255,.06);--muted:#635e58;--text:#ede8df;
  --serif:'Cormorant Garamond',serif;--cond:'Barlow Condensed',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.box{width:360px;background:var(--surface);border:1px solid var(--goldBd);padding:32px}
.seal{width:32px;height:32px;border:1px solid var(--goldBd);background:var(--goldW);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--gold);margin:0 auto 14px}
.title{font-family:var(--cond);font-size:20px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text);text-align:center;margin-bottom:6px}
.sub{font-family:var(--mono);font-size:7.5px;color:var(--muted);text-align:center;line-height:1.75;margin-bottom:20px}
.lbl{font-family:var(--mono);font-size:6.5px;letter-spacing:.22em;color:var(--goldD);text-transform:uppercase;display:block;margin-bottom:5px;margin-top:12px}
input{width:100%;padding:10px 12px;font-family:var(--mono);font-size:12px;background:var(--input-bg);color:var(--text);border:1px solid var(--wire);outline:none;transition:border-color .15s}
input:focus{border-color:var(--goldBdS)}
.btn{width:100%;margin-top:16px;padding:11px;font-family:var(--cond);font-size:14px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--bg);background:var(--gold);border:none;cursor:pointer;transition:background .14s}
.btn:hover{background:var(--goldB)}
.err{font-family:var(--mono);font-size:8px;color:var(--red);background:var(--redW);border:1px solid var(--redBd);padding:8px 11px;margin-top:10px;display:none}
.err.on{display:block}
.success{font-family:var(--mono);font-size:8px;color:var(--green);background:var(--greenW);border:1px solid var(--greenBd);padding:10px 12px;margin-top:10px;line-height:1.7;display:none}
.success.on{display:block}
.back{display:block;text-align:center;font-family:var(--mono);font-size:7px;color:var(--muted);margin-top:14px;text-decoration:none;transition:color .14s}
.back:hover{color:var(--gold)}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE-PASS — additive only, scoped to touch devices ≤768px.
═══════════════════════════════════════════════════════════════════ */
@media (max-width: 768px) and (hover: none) and (pointer: coarse) {
  /* Email input was 12px — kills iOS auto-zoom */
  input, select, textarea { font-size: 16px; }
  /* Body audited at 400px width — clamp to viewport */
  html, body { overflow-x: hidden; max-width: 100vw; }
  body { padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; }
  .box { max-width: 100%; box-sizing: border-box; }
}
</style>
</head><body>
<div class="box">
  <div class="seal"><em style="font-family:Georgia,serif;font-style:italic;font-size:15px;letter-spacing:-.04em;font-weight:500">Au</em></div>
  <div class="title">Reset Password</div>
  <div class="sub">Enter your advisor email. We'll send a 6-digit code to reset your password.</div>
  <div id="step1">
    <label class="lbl">Advisor Email</label>
    <input id="email" type="email" placeholder="advisor@firm.com" onkeydown="if(event.key==='Enter')sendCode()">
    <div class="err" id="err1"></div>
    <button class="btn" id="btn1" onclick="sendCode()">Send Reset Code →</button>
  </div>
  <div id="step2" style="display:none">
    <div class="success on">Code sent — check your email. Enter it below to continue.</div>
    <label class="lbl">6-Digit Code</label>
    <input id="code" type="text" maxlength="6" placeholder="000000" style="letter-spacing:.22em;font-size:18px;text-align:center" onkeydown="if(event.key==='Enter')verifyCode()">
    <label class="lbl">New Password (min 8 chars)</label>
    <input id="newpw" type="password" placeholder="New password" onkeydown="if(event.key==='Enter')verifyCode()">
    <label class="lbl">Confirm Password</label>
    <input id="confirmpw" type="password" placeholder="Confirm password" onkeydown="if(event.key==='Enter')verifyCode()">
    <div class="err" id="err2"></div>
    <button class="btn" id="btn2" onclick="verifyCode()">Set New Password →</button>
  </div>
  <div id="step3" style="display:none">
    <div class="success on">Password updated successfully. You can now log in.</div>
    <a href="/login" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:12px">Log In →</a>
  </div>
</div>
<a href="/login" class="back">← Back to Login</a>
<script>
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('on')}
function clearErr(id){document.getElementById(id).classList.remove('on')}
async function sendCode(){
  clearErr('err1');
  const email=document.getElementById('email').value.trim();
  if(!email){showErr('err1','Email required');return;}
  document.getElementById('btn1').disabled=true;document.getElementById('btn1').textContent='Sending…';
  await fetch('/api/v2?resource=advisor&op=forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
}
async function verifyCode(){
  clearErr('err2');
  const code=document.getElementById('code').value.trim();
  const pw=document.getElementById('newpw').value;
  const cpw=document.getElementById('confirmpw').value;
  const email=document.getElementById('email').value.trim();
  if(!code||code.length!==6){showErr('err2','Enter the 6-digit code');return;}
  if(!pw||pw.length<8){showErr('err2','Password must be at least 8 characters');return;}
  if(pw!==cpw){showErr('err2','Passwords do not match');return;}
  document.getElementById('btn2').disabled=true;document.getElementById('btn2').textContent='Updating…';
  try{
    const r=await fetch('/api/v2?resource=advisor&op=reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,code,password:pw})});
    const d=await r.json();
    if(!d.ok){showErr('err2',d.error||'Invalid code');document.getElementById('btn2').disabled=false;document.getElementById('btn2').textContent='Set New Password →';return;}
    document.getElementById('step2').style.display='none';document.getElementById('step3').style.display='block';
  }catch{showErr('err2','Error — try again');document.getElementById('btn2').disabled=false;document.getElementById('btn2').textContent='Set New Password →';}
}
</script>
</body></html>
